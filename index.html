<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Geoguessr</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://unpkg.com/mapillary-js@4.1.2/dist/mapillary.css" rel="stylesheet" />
<script src="https://unpkg.com/mapillary-js@4.1.2/dist/mapillary.js"></script>
<style>
  :root {
    --bg: #0b0e14;
    --panel: #171b24;
    --panel-2: #1f2430;
    --border: #2a3040;
    --text: #f2f3f5;
    --text-dim: #9aa3b2;
    --accent: #22c55e;
    --accent-hover: #1ba750;
    --accent-2: #8b5cf6;
    --danger: #ef4444;
    --warn: #f59e0b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text);
    height: 100vh; overflow: hidden;
  }
  h1, h2 { font-weight: 800; }

  #start-screen {
    position: fixed; inset: 0;
    background: radial-gradient(circle at 50% 20%, #151a24 0%, var(--bg) 70%);
    display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 14px;
    z-index: 1000; padding: 20px; text-align: center;
  }
  #start-screen h1 { margin: 0; font-size: 42px; letter-spacing: -0.5px; }
  #start-screen h1 span { color: var(--accent); }
  #logo { width: 72px; height: auto; margin-bottom: 4px; }
  #start-screen input {
    width: 320px; max-width: 90vw; padding: 12px 14px; font-size: 14px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--panel); color: var(--text); text-align: center;
    outline: none;
  }
  #start-screen input:focus { border-color: var(--accent); }

  .btn {
    padding: 13px 30px; font-size: 15px; font-weight: 700; border-radius: 999px; border: none;
    background: var(--accent); color: #06210f; cursor: pointer; transition: transform 0.08s ease, background 0.15s ease;
  }
  .btn:hover { background: var(--accent-hover); }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { background: #3a4152; color: #6b7280; cursor: not-allowed; transform: none; }
  .btn-secondary { background: var(--accent-2); color: #fff; }
  .btn-secondary:hover { background: #7c4de0; }
  .btn-ghost {
    background: transparent; color: var(--text-dim); border: 1px solid var(--border); padding: 8px 16px; font-size: 13px;
    cursor: pointer; margin-top: 4px;
  }
  .btn-ghost:hover { background: var(--panel-2); color: var(--text); }

  #game { display: none; height: 100vh; position: relative; background: #000; }
  #photo-panel { height: 100vh; background: #000; position: relative; }
  #mly { width: 100%; height: 100%; }
  #loading {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 15px; color: var(--text-dim); text-align: center; padding: 20px; z-index: 5; background: rgba(0,0,0,0.85);
  }

  #map-wrap {
    position: absolute; bottom: 18px; right: 18px; width: 200px; height: 140px;
    border-radius: 14px; overflow: hidden; box-shadow: 0 8px 30px rgba(0,0,0,0.6);
    border: 3px solid var(--accent); z-index: 600; cursor: pointer;
    transition: width 0.2s ease, height 0.2s ease;
  }
  #map-wrap:hover, #map-wrap.expanded { width: 46vw; height: 46vh; }
  /* While results are showing, the map takes over most of the screen so you
     can actually see your guess vs. the real location — the result bar below
     only takes up the bottom strip instead of covering everything. */
  #map-wrap.result-view {
    top: 16px; left: 16px; right: 16px; bottom: 190px; width: auto; height: auto; z-index: 700; cursor: default;
  }
  #map { width: 100%; height: 100%; }

  /* A single flex row spanning the full width, instead of independently
     absolute-positioned pieces (HUD pills anchored left, timer centered via
     left:50%) — on narrow phone screens the HUD row's width alone could
     exceed half the screen and collide with the centered timer. Flex with
     wrap keeps everything laid out relative to each other so nothing overlaps,
     and lets pieces wrap to a second line if they truly don't fit. */
  /* Mapillary's own viewer draws its built-in controls (compass, zoom,
     sequence arrows) somewhere inside #mly, underneath these overlays. Round/
     Score/Timer are purely informational — they have no click handlers — so
     they're click-through by default; only the Leave button opts back in to
     receiving clicks. This way our HUD never blocks Mapillary's controls
     no matter where it decides to place them. */
  #hud {
    position: absolute; top: 14px; left: 14px; right: 14px; z-index: 500;
    display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap;
    pointer-events: none;
  }
  .hud-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .hud-pill {
    background: rgba(15,18,25,0.85); backdrop-filter: blur(6px); padding: 8px 16px; border-radius: 999px;
    font-size: 14px; font-weight: 600; border: 1px solid var(--border); white-space: nowrap;
  }
  .hud-pill b, .hud-pill #score, .hud-pill #round { color: var(--accent); }
  .hud-leave {
    cursor: pointer; color: #fca5a5; background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.4);
    pointer-events: auto;
  }
  .hud-leave:hover { background: rgba(239,68,68,0.3); }

  #timer {
    z-index: 500; pointer-events: none; position: relative; top: 50px;
    background: rgba(15,18,25,0.85); backdrop-filter: blur(6px); border: 1px solid var(--border);
    border-radius: 999px; padding: 8px 18px; font-size: 16px; font-weight: 800; font-variant-numeric: tabular-nums;
    color: var(--accent); transition: color 0.2s ease, border-color 0.2s ease;
  }
  #timer.timer-warn { color: var(--warn); border-color: var(--warn); }
  #timer.timer-danger { color: var(--danger); border-color: var(--danger); animation: pulse 1s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

  #guess-btn {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 600;
    padding: 15px 46px; font-size: 16px; box-shadow: 0 6px 20px rgba(34,197,94,0.35);
  }

  /* GeoGuessr-style movement arrows: each navigable road is drawn as a
     circular arrow badge positioned (by JS, via viewer.project) at the spot
     in the photo where that road actually leads, clamped to the screen edge
     when the road is out of view. See the nav-* JS below. */
  #nav-layer { position: absolute; inset: 0; z-index: 50; pointer-events: none; }
  .nav-arrow {
    position: absolute; width: 64px; height: 64px; margin: -32px 0 0 -32px;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.25); border: 2px solid rgba(255,255,255,0.15);
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.6)); cursor: pointer; pointer-events: auto;
    transition: left 0.08s linear, top 0.08s linear;
  }
  .nav-arrow:hover { background: rgba(255,255,255,0.4); }
  .nav-arrow img {
    width: 28px; pointer-events: none;
    /* arrow.png is solid white on transparent — brightness() scales the RGB
       channels down to a dark grey without touching the alpha/transparency. */
    filter: brightness(0.35);
  }

  #result {
    position: fixed; left: 0; right: 0; bottom: 0; background: rgba(10,12,18,0.97);
    backdrop-filter: blur(8px); border-top: 1px solid var(--border);
    display: none; align-items: center; justify-content: center;
    flex-direction: column; gap: 8px; z-index: 900; text-align: center; padding: 18px 20px;
  }
  #result-card {
    display: flex; flex-direction: column; gap: 8px; align-items: center; max-width: 480px; width: 100%;
  }
  #result h2 { margin: 0; font-size: 30px; }
  #result p { margin: 0; color: var(--text-dim); }
  #results-table { width: 100%; max-width: 360px; text-align: left; font-size: 14px; border-collapse: collapse; margin-top: 6px; }
  #results-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); }
  #results-table tr:first-child td { color: var(--accent); font-weight: 700; }

  #lobby { display: none; flex-direction: column; gap: 16px; align-items: center; }
  #lobby input { text-transform: none; }
  #lobby-code {
    font-size: 34px; letter-spacing: 8px; font-weight: 800; background: var(--panel); padding: 12px 24px;
    border-radius: 10px; border: 1px solid var(--border); color: var(--accent);
  }
  #lobby-link-row { display: flex; gap: 8px; align-items: center; max-width: 360px; }
  #lobby-link { font-size: 12px; color: var(--text-dim); word-break: break-all; }
  .divider { color: #4a5164; font-size: 13px; }

  #player-list {
    position: absolute; top: 14px; right: 16px; background: rgba(15,18,25,0.85); backdrop-filter: blur(6px);
    padding: 12px 16px; border-radius: 12px; font-size: 13px; z-index: 500; min-width: 150px;
    border: 1px solid var(--border); pointer-events: none;
  }
  #player-list .player-row { display: flex; justify-content: space-between; gap: 12px; padding: 4px 0; }
  #player-list .player-row.host span:first-child::before { content: "\1F451 "; }
  #player-list .guessed { color: var(--accent); font-weight: 600; }

  @media (max-width: 700px) {
    #start-screen h1 { font-size: 30px; }
    #start-screen input { width: 100%; }
    .hud-pill { padding: 6px 11px; font-size: 12px; }
    #player-list { padding: 8px 10px; font-size: 11px; min-width: 100px; }
    #map-wrap { width: 110px; height: 80px; bottom: 90px; right: 10px; border-width: 2px; }
    #map-wrap:hover { width: 110px; height: 80px; }
    #map-wrap.expanded { width: 78vw; height: 46vh; }
    #map-wrap.result-view { top: 10px; left: 10px; right: 10px; bottom: 230px; }
    #guess-btn { padding: 12px 30px; font-size: 14px; bottom: 14px; }
    #timer { font-size: 13px; padding: 6px 12px; top: 40px; }
    #result { padding: 14px 16px; }
    .nav-arrow { width: 52px; height: 52px; margin: -26px 0 0 -26px; }
    .nav-arrow img { width: 22px; }
  }
</style>
</head>
<body>

<div id="start-screen">
  <img src="assets/logo.png" alt="" id="logo" />
  <h1>Geo<span>Guessr</span></h1>
  <p style="color:var(--text-dim); max-width:420px; font-size:14px">Walk around a real street using the arrows, then guess where you are on the map.</p>
  <button class="btn" id="start-btn">Play solo</button>
  <div class="divider">or</div>
  <button class="btn btn-secondary" id="friends-btn">Play with friends</button>

  <div id="lobby">
    <div id="lobby-create">
      <input id="name-input" type="text" placeholder="Your name" maxlength="20" />
      <button class="btn" id="create-room-btn" style="margin-top:8px">Create room</button>
    </div>
    <div class="divider">or</div>
    <div id="lobby-join">
      <input id="join-code-input" type="text" placeholder="Room code" maxlength="5" style="text-transform:uppercase" />
      <button class="btn" id="join-room-btn" style="margin-top:8px">Join room</button>
    </div>
    <div id="lobby-waiting" style="display:none; flex-direction:column; align-items:center; gap:12px;">
      <div id="lobby-code"></div>
      <div id="lobby-link-row">
        <div id="lobby-link"></div>
        <button class="btn-ghost" id="copy-link-btn" style="display:none; border-radius:6px; padding:4px 10px; font-size:11px; cursor:pointer;">Copy</button>
      </div>
      <div id="lobby-players" style="font-size:14px; color:#ccc;"></div>
      <button class="btn" id="host-start-btn" style="display:none">Start game</button>
      <p id="lobby-status" style="font-size:13px; color:var(--text-dim)">Waiting for host to start...</p>
      <button class="btn-ghost" id="lobby-leave-btn">Leave</button>
    </div>
  </div>
</div>

<div id="game">
  <div id="hud">
    <div class="hud-group">
      <div class="hud-pill">Round <span id="round">1</span>/5</div>
      <div class="hud-pill">Score <span id="score">0</span></div>
    </div>
    <div id="timer" style="display:none">60</div>
    <button id="leave-btn" class="hud-pill hud-leave">Leave</button>
  </div>
  <div id="player-list" style="display:none"></div>
  <div id="photo-panel">
    <div id="loading">Loading street view...</div>
    <div id="mly"></div>
    <div id="nav-layer"></div>
  </div>
  <button id="guess-btn" class="btn">Guess</button>
  <div id="map-wrap"><div id="map"></div></div>
</div>

<div id="result">
  <div id="result-card">
    <h2 id="result-title"></h2>
    <p id="result-detail"></p>
    <table id="results-table" style="display:none"></table>
    <button class="btn" id="next-btn">Next round</button>
    <button class="btn-ghost" id="result-leave-btn">Leave</button>
  </div>
</div>

<script>
let TOKEN = "__MAPILLARY_TOKEN__"; // injected by server.js from the MAPILLARY_TOKEN env var at request time
// Auto-detects the server's own address — works because the game is now served
// from the same Railway app that runs the WebSocket server. If you ever open
// this file locally instead (double-clicking it) rather than via the deployed
// URL, set this to your Railway wss:// domain manually instead.
const WS_URL = (location.protocol === "https:" ? "wss://" : "ws://") + location.host;
let map, guessMarker, actualMarker, connectLine, mlyViewer;
let currentCoords = null;
let currentImageId = null;
let round = 1;
let totalScore = 0;
const MAX_ROUNDS = 5;
const SOLO_TIMEOUT_MS = 60000;
const MP_SESSION_KEY = "gw_mp_session";
const SOLO_SESSION_KEY = "gw_solo_session";

// --- Multiplayer state ---
let ws = null;
let myId = null;
let myToken = null;
let myName = "Player";
let currentRoomCode = null;
let hostId = null;
let isMultiplayer = false;
let hasGuessedThisRound = false;
let latestPlayers = [];

// --- Round timer ---
let timerInterval = null;
let timerEndAt = 0;

function startTimer(ms) {
  stopTimer();
  timerEndAt = Date.now() + (ms || 0);
  const el = document.getElementById("timer");
  el.style.display = "inline-flex";
  const tick = () => {
    const remain = Math.max(0, timerEndAt - Date.now());
    const secs = Math.ceil(remain / 1000);
    el.textContent = secs;
    el.classList.toggle("timer-warn", secs <= 15 && secs > 5);
    el.classList.toggle("timer-danger", secs <= 5);
    if (remain <= 0) {
      clearInterval(timerInterval);
      timerInterval = null;
      onTimerExpired();
    }
  };
  tick();
  timerInterval = setInterval(tick, 250);
}
function stopTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = null;
  const el = document.getElementById("timer");
  el.style.display = "none";
  el.classList.remove("timer-warn", "timer-danger");
}
function onTimerExpired() {
  if (!isMultiplayer) {
    submitGuess(true);
  } else {
    document.getElementById("guess-btn").disabled = true;
  }
}

// --- Session persistence (survive a page refresh) ---

function saveMPSession() {
  if (!currentRoomCode || !myToken) return;
  localStorage.setItem(MP_SESSION_KEY, JSON.stringify({ code: currentRoomCode, token: myToken, name: myName }));
}
function clearMPSession() { localStorage.removeItem(MP_SESSION_KEY); }
function loadMPSession() {
  try { return JSON.parse(localStorage.getItem(MP_SESSION_KEY) || "null"); } catch { return null; }
}

function saveSoloSession() {
  if (isMultiplayer || !currentImageId) return;
  localStorage.setItem(SOLO_SESSION_KEY, JSON.stringify({
    round, totalScore, imageId: currentImageId,
    lat: currentCoords ? currentCoords.lat : null,
    lon: currentCoords ? currentCoords.lon : null,
  }));
}
function clearSoloSession() { localStorage.removeItem(SOLO_SESSION_KEY); }
function loadSoloSession() {
  try { return JSON.parse(localStorage.getItem(SOLO_SESSION_KEY) || "null"); } catch { return null; }
}

// Well-covered street locations to seed each round's search
const SPOTS = [
  { name: "New York", lat: 40.7580, lon: -73.9855 },
  { name: "London", lat: 51.5100, lon: -0.1340 },
  { name: "Paris", lat: 48.8698, lon: 2.3078 },
  { name: "Tokyo", lat: 35.6595, lon: 139.7005 },
  { name: "Amsterdam", lat: 52.3731, lon: 4.8926 },
  { name: "Berlin", lat: 52.5163, lon: 13.3777 },
  { name: "Barcelona", lat: 41.3809, lon: 2.1730 },
  { name: "San Francisco", lat: 37.7897, lon: -122.4000 },
  { name: "Sydney", lat: -33.8568, lon: 151.2153 },
  { name: "Toronto", lat: 43.6544, lon: -79.3807 },
  { name: "Madrid", lat: 40.4200, lon: -3.7025 },
  { name: "Rome", lat: 41.8902, lon: 12.4922 },
];

function lonLatToTile(lon, lat, z) {
  const n = Math.pow(2, z);
  const x = Math.floor((lon + 180) / 360 * n);
  const latRad = lat * Math.PI / 180;
  const y = Math.floor((1 - Math.log(Math.tan(latRad) + 1 / Math.cos(latRad)) / Math.PI) / 2 * n);
  return { x, y, z };
}

// --- Precise (BigInt-safe) vector tile parsing ---
// Mapillary image IDs are 64-bit and JS numbers can't hold them exactly,
// so we hand-parse just the "id" property as a BigInt instead of trusting
// a standard decoder's lossy Number conversion.

function readVarintNumber(buf, pos) {
  let result = 0, shift = 0, b;
  do { b = buf[pos.i++]; result += (b & 0x7f) * Math.pow(2, shift); shift += 7; } while (b >= 0x80);
  return result;
}
function readVarintBigInt(buf, pos) {
  let result = 0n, shift = 0n, b;
  do { b = buf[pos.i++]; result |= BigInt(b & 0x7f) << shift; shift += 7n; } while (b >= 0x80);
  return result;
}
function readTag(buf, pos) {
  const v = readVarintNumber(buf, pos);
  return { field: v >>> 3, wireType: v & 0x7 };
}
function skipField(buf, pos, wireType) {
  if (wireType === 0) { while (buf[pos.i++] >= 0x80) {} }
  else if (wireType === 2) { const len = readVarintNumber(buf, pos); pos.i += len; }
  else if (wireType === 1) pos.i += 8;
  else if (wireType === 5) pos.i += 4;
}
function parseValue(buf, start, end) {
  const pos = { i: start };
  let out = null, isBool = null;
  while (pos.i < end) {
    const { field, wireType } = readTag(buf, pos);
    if ((field === 4 || field === 5 || field === 6) && wireType === 0) {
      out = readVarintBigInt(buf, pos).toString();
    } else if (field === 7 && wireType === 0) {
      isBool = readVarintNumber(buf, pos) !== 0;
    } else {
      skipField(buf, pos, wireType);
    }
  }
  return { str: out, bool: isBool };
}
function parseLayer(buf, start, end) {
  const pos = { i: start };
  let name = null;
  const keys = [], values = [], features = [];
  while (pos.i < end) {
    const { field, wireType } = readTag(buf, pos);
    if (field === 1 && wireType === 2) {
      const len = readVarintNumber(buf, pos);
      name = new TextDecoder().decode(buf.subarray(pos.i, pos.i + len));
      pos.i += len;
    } else if (field === 2 && wireType === 2) {
      const len = readVarintNumber(buf, pos);
      features.push({ start: pos.i, end: pos.i + len });
      pos.i += len;
    } else if (field === 3 && wireType === 2) {
      const len = readVarintNumber(buf, pos);
      keys.push(new TextDecoder().decode(buf.subarray(pos.i, pos.i + len)));
      pos.i += len;
    } else if (field === 4 && wireType === 2) {
      const len = readVarintNumber(buf, pos);
      values.push(parseValue(buf, pos.i, pos.i + len));
      pos.i += len;
    } else {
      skipField(buf, pos, wireType);
    }
  }
  return { name, keys, values, features };
}
function parseFeatureTags(buf, start, end) {
  const pos = { i: start };
  const tags = [];
  while (pos.i < end) {
    const { field, wireType } = readTag(buf, pos);
    if (field === 2 && wireType === 2) {
      const len = readVarintNumber(buf, pos);
      const endT = pos.i + len;
      while (pos.i < endT) tags.push(readVarintNumber(buf, pos));
      pos.i = endT;
    } else {
      skipField(buf, pos, wireType);
    }
  }
  return tags;
}
function parseTileLayers(buf) {
  const pos = { i: 0 };
  const layers = [];
  while (pos.i < buf.length) {
    const { field, wireType } = readTag(buf, pos);
    if (field === 3 && wireType === 2) {
      const len = readVarintNumber(buf, pos);
      layers.push(parseLayer(buf, pos.i, pos.i + len));
      pos.i += len;
    } else {
      skipField(buf, pos, wireType);
    }
  }
  return layers;
}
function extractPreciseImageData(buf) {
  const layers = parseTileLayers(buf);
  const layer = layers.find(l => l.name === 'image');
  if (!layer) return [];
  const idKeyIdx = layer.keys.indexOf('id');
  const panoKeyIdx = layer.keys.indexOf('is_pano');
  if (idKeyIdx === -1) return [];
  const out = [];
  for (const feat of layer.features) {
    const tags = parseFeatureTags(buf, feat.start, feat.end);
    let id = null, isPano = false;
    for (let i = 0; i < tags.length; i += 2) {
      const key = tags[i], valIdx = tags[i + 1];
      if (key === idKeyIdx && layer.values[valIdx]) id = layer.values[valIdx].str;
      if (key === panoKeyIdx && layer.values[valIdx]) isPano = layer.values[valIdx].bool === true;
    }
    if (id) out.push({ id, isPano });
  }
  return out;
}

// Kicked off once at page load (during the start screen, not on the critical
// path of a round) so by the time a round actually needs these, they're
// already resolved from the module cache instead of costing a CDN round trip.
const vectorTileModules = Promise.all([
  import('https://esm.sh/pbf@3.2.1'),
  import('https://esm.sh/@mapbox/vector-tile@1.3.1'),
]).then(([pbfMod, vtMod]) => ({ Protobuf: pbfMod.default, VectorTile: vtMod.VectorTile }));

// Find a real, precise (BigInt-safe) starting image id near a spot.
// We use the standard vector-tile decoder for lon/lat (safe, no big integers
// involved there) and our own manual parser for the id (must stay exact).
async function findStartImageId(spot) {
  const t = lonLatToTile(spot.lon, spot.lat, 14);
  const url = `https://tiles.mapillary.com/maps/vtp/mly1_public/2/${t.z}/${t.x}/${t.y}?access_token=${TOKEN}`;
  const [res, { Protobuf, VectorTile }] = await Promise.all([fetch(url), vectorTileModules]);
  if (!res.ok) return null;
  const buf = new Uint8Array(await res.arrayBuffer());

  const imageData = extractPreciseImageData(buf);
  if (imageData.length === 0) return null;

  const tile = new VectorTile(new Protobuf(buf));
  const layer = tile.layers['image'];
  if (!layer || layer.length === 0) return null;

  // Both parses walk the layer's features in the same order, so index i in
  // imageData corresponds to layer.feature(i).
  const panoIndices = imageData.map((d, i) => d.isPano ? i : -1).filter(i => i !== -1);
  const pool = panoIndices.length > 0 ? panoIndices : imageData.map((_, i) => i);

  const idx = pool[Math.floor(Math.random() * pool.length)];
  const feature = layer.feature(idx);
  const gj = feature.toGeoJSON(t.x, t.y, t.z);
  return {
    id: imageData[idx].id,
    lat: gj.geometry.coordinates[1],
    lon: gj.geometry.coordinates[0],
    isPano: imageData[idx].isPano,
  };
}

// Shared Mapillary viewer setup used by solo, multiplayer, and resume/rejoin flows.
function mountViewer(imageId, { onImage } = {}) {
  currentImageId = imageId;
  if (mlyViewer) { mlyViewer.remove(); mlyViewer = null; }
  mlyViewer = new mapillary.Viewer({
    accessToken: TOKEN,
    container: 'mly',
    imageId: imageId,
    // Disable every bit of Mapillary's own UI chrome, including `direction`
    // (its on-image navigation arrows, which faded in/out unreliably as edge
    // data loaded) — the always-on nav-* slots below replace it. Edge data
    // and bearing itself (sequenceedges/spatialedges/bearing events) are
    // unaffected by this and still drive moveDir(), since that's core
    // Navigator behavior, not tied to whether the visual component is
    // enabled. Keep `attribution` since Mapillary requires it.
    component: { cover: false, bearing: false, zoom: false, sequence: false, direction: false },
  });
  mlyViewer.on('image', (event) => {
    if (event.image && event.image.lngLat) {
      currentCoords = { lat: event.image.lngLat.lat, lon: event.image.lngLat.lng };
    }
    resetNavAvailability();
    if (onImage) onImage();
  });
  mlyViewer.on('sequenceedges', (event) => setNavSequenceEdges(event.status));
  mlyViewer.on('spatialedges', (event) => setNavSpatialEdges(event.status));
  mlyViewer.on('bearing', (event) => { navBearingDeg = event.bearing; renderNavArrows(); });
}

// --- On-image navigation arrows (GeoGuessr-style, replacing Mapillary's own) ---
// Each navigable edge is drawn as a circular arrow badge positioned at the
// point in the photo where that road actually leads (via viewer.project of a
// point offset along the edge's real-world bearing). When a road is in view
// the badge sits ON it; when it's outside the current field of view the badge
// clamps to the screen edge in the road's direction so it never just vanishes.
// Clicking a badge moves along that edge. Everything is recomputed as you look
// around (bearing event) so it always tracks the real geometry.

let navSequenceEdges = [];
let navSpatialEdges = [];
let navBearingDeg = 0; // current view bearing, degrees clockwise from north
let roundActive = true; // false once results are showing — blocks nav + guessing
let navRenderSeq = 0; // guards against overlapping async renders

function resetNavAvailability() {
  navSequenceEdges = [];
  navSpatialEdges = [];
  renderNavArrows();
}
function setNavSequenceEdges(status) {
  if (!status.cached) return;
  navSequenceEdges = status.edges;
  renderNavArrows();
}
function setNavSpatialEdges(status) {
  if (!status.cached) return;
  navSpatialEdges = status.edges;
  renderNavArrows();
}

function azimuthToBearingDeg(azimuthRad) {
  const deg = (-azimuthRad + Math.PI / 2) * 180 / Math.PI;
  return ((deg % 360) + 360) % 360;
}
function destLngLat(lat, lon, brgDeg, distM) {
  const R = 6378137, d = distM / R, t = brgDeg * Math.PI / 180;
  const p1 = lat * Math.PI / 180, l1 = lon * Math.PI / 180;
  const p2 = Math.asin(Math.sin(p1) * Math.cos(d) + Math.cos(p1) * Math.sin(d) * Math.cos(t));
  const l2 = l1 + Math.atan2(Math.sin(t) * Math.sin(d) * Math.cos(p1), Math.cos(d) - Math.sin(p1) * Math.sin(p2));
  return { lat: p2 * 180 / Math.PI, lng: l2 * 180 / Math.PI };
}
// Prefer real spatial steps/turns/spherical (they carry a true bearing) over
// sequence Next/Prev (which don't). Lower = higher priority when de-duping
// two edges that resolve to nearly the same on-screen direction.
function navPriority(direction) {
  const D = mapillary.NavigationDirection;
  const order = [D.StepForward, D.StepBackward, D.StepLeft, D.StepRight, D.TurnLeft, D.TurnRight, D.Spherical, D.Similar, D.Next, D.Prev];
  const idx = order.indexOf(direction);
  return idx === -1 ? order.length : idx;
}
// Clamp the segment center->target to the viewport (inset by margin). Returns
// the target itself when it's already inside, otherwise the border crossing.
function clampToViewport(cx, cy, tx, ty, W, H, margin) {
  let dx = tx - cx, dy = ty - cy, t = 1;
  if (dx > 0) t = Math.min(t, (W - margin - cx) / dx);
  else if (dx < 0) t = Math.min(t, (margin - cx) / dx);
  if (dy > 0) t = Math.min(t, (H - margin - cy) / dy);
  else if (dy < 0) t = Math.min(t, (margin - cy) / dy);
  t = Math.max(0, Math.min(1, t));
  return [cx + dx * t, cy + dy * t];
}

function navArrowLayer() { return document.getElementById('nav-layer'); }

async function renderNavArrows() {
  const seq = ++navRenderSeq;
  const layer = navArrowLayer();
  if (!layer) return;
  if (!roundActive || !mlyViewer || !currentCoords) { layer.innerHTML = ''; return; }

  const canvas = mlyViewer.getCanvas();
  const W = canvas.clientWidth, H = canvas.clientHeight;
  const cx = W / 2, cy = H / 2;
  const lat = currentCoords.lat, lon = currentCoords.lon;

  // Build candidate directions. Edges with a real bearing get projected;
  // dedupe by ~15deg bearing bucket keeping the highest-priority direction.
  const byBucket = new Map();
  for (const edge of [...navSpatialEdges, ...navSequenceEdges]) {
    const az = edge.data.worldMotionAzimuth;
    if (!isFinite(az)) continue;
    const brg = azimuthToBearingDeg(az);
    const key = Math.round(brg / 15);
    const cur = byBucket.get(key);
    if (!cur || navPriority(edge.data.direction) < navPriority(cur.data.direction)) byBucket.set(key, edge);
  }

  const items = [];
  for (const edge of byBucket.values()) {
    const brg = azimuthToBearingDeg(edge.data.worldMotionAzimuth);
    const near = await mlyViewer.project(destLngLat(lat, lon, brg, 8));
    const far = await mlyViewer.project(destLngLat(lat, lon, brg, 40));
    if (seq !== navRenderSeq) return; // a newer render started; abort

    let x, y, rotation;
    const target = near || far;
    if (target) {
      [x, y] = clampToViewport(cx, cy, target[0], target[1], W, H, 40);
      if (near && far) {
        rotation = 180 + Math.atan2(far[0] - near[0], -(far[1] - near[1])) * 180 / Math.PI;
      } else {
        const rel = ((brg - navBearingDeg + 180) % 360 + 360) % 360 - 180;
        rotation = 180 + rel;
      }
    } else {
      // Behind the camera (nothing projects): pin to bottom edge, pointing back.
      const rel = ((brg - navBearingDeg + 180) % 360 + 360) % 360 - 180;
      [x, y] = clampToViewport(cx, cy, cx + Math.sin(rel * Math.PI / 180) * 2000, cy - Math.cos(rel * Math.PI / 180) * 2000, W, H, 40);
      rotation = 180 + rel;
    }
    items.push({ target: edge.target, x, y, rotation });
  }

  if (seq !== navRenderSeq) return;
  layer.innerHTML = '';
  for (const it of items) {
    const badge = document.createElement('div');
    badge.className = 'nav-arrow';
    badge.style.left = it.x + 'px';
    badge.style.top = it.y + 'px';
    const img = document.createElement('img');
    img.src = 'assets/arrow.png';
    img.alt = '';
    img.style.transform = `rotate(${it.rotation}deg)`;
    badge.appendChild(img);
    badge.addEventListener('click', (e) => {
      e.stopPropagation();
      // moveTo(targetImageId) navigates to the specific connected image —
      // reliable across all edge types. moveDir(Spherical) in particular is a
      // no-op for panoramas, which was the real "clicking doesn't move" bug.
      if (roundActive && mlyViewer && it.target) mlyViewer.moveTo(it.target).catch(() => {});
    });
    layer.appendChild(badge);
  }
}

async function loadRound(tried = []) {
  const status = document.getElementById("loading");
  status.style.display = "flex";
  status.textContent = "Loading street view...";
  document.getElementById("round").textContent = round;
  document.getElementById("guess-btn").disabled = false;

  const remaining = SPOTS.filter(s => !tried.includes(s.name));
  if (remaining.length === 0) {
    status.textContent = "Couldn't find coverage right now. Try again.";
    return;
  }

  // Try a few candidate spots concurrently instead of one at a time — a
  // single spot's tile sometimes has no image coverage, and retrying those
  // sequentially was the main source of slow round loads.
  const batch = [...remaining].sort(() => Math.random() - 0.5).slice(0, 3);

  try {
    const results = await Promise.all(batch.map(spot => findStartImageId(spot).catch(() => null)));
    const start = results.find(r => r);
    if (!start) return loadRound([...tried, ...batch.map(s => s.name)]);

    currentCoords = { lat: start.lat, lon: start.lon };
    mountViewer(start.id, {
      onImage: () => { status.style.display = "none"; saveSoloSession(); }
    });
    saveSoloSession();
    startTimer(SOLO_TIMEOUT_MS);
  } catch (err) {
    status.textContent = "Error: " + err.message;
  }
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function scoreFromDistance(km) {
  return Math.round(5000 * Math.exp(-km / 2000));
}

function connectWS(onOpen) {
  if (!WS_URL || WS_URL.includes("PASTE_YOUR")) {
    alert("Set WS_URL near the top of the script to your deployed Railway domain first.");
    return;
  }
  ws = new WebSocket(WS_URL);
  ws.onopen = () => onOpen && onOpen();
  ws.onmessage = (event) => handleWSMessage(JSON.parse(event.data));
  ws.onclose = () => { document.getElementById("lobby-status").textContent = "Disconnected from server."; };
  ws.onerror = () => { document.getElementById("lobby-status").textContent = "Connection error — check WS_URL and that the server is running."; };
}

function handleWSMessage(msg) {
  if (msg.type === "room_created") {
    myId = msg.id; hostId = msg.hostId; myToken = msg.token; currentRoomCode = msg.code;
    saveMPSession();
    document.getElementById("lobby-create").style.display = "none";
    document.getElementById("lobby-join").previousElementSibling.style.display = "none";
    document.getElementById("lobby-join").style.display = "none";
    document.getElementById("lobby-waiting").style.display = "flex";
    document.getElementById("lobby-code").textContent = msg.code;
    const link = `${location.origin}${location.pathname}?room=${msg.code}`;
    document.getElementById("lobby-link").textContent = link;
    document.getElementById("copy-link-btn").style.display = "inline-block";
    document.getElementById("host-start-btn").style.display = "inline-block";
    document.getElementById("lobby-status").textContent = "Share the code or link. Start whenever you're ready.";
  }

  else if (msg.type === "room_joined") {
    myId = msg.id; hostId = msg.hostId; myToken = msg.token; currentRoomCode = msg.code;
    saveMPSession();
    document.getElementById("lobby-create").style.display = "none";
    document.getElementById("lobby-join").previousElementSibling.style.display = "none";
    document.getElementById("lobby-join").style.display = "none";
    document.getElementById("lobby-waiting").style.display = "flex";
    document.getElementById("lobby-code").textContent = msg.code;
    document.getElementById("lobby-link").textContent = "";
    document.getElementById("copy-link-btn").style.display = "none";
    document.getElementById("lobby-status").textContent = "Waiting for host to start...";
  }

  else if (msg.type === "rejoined") {
    isMultiplayer = true;
    myId = msg.id; hostId = msg.hostId; currentRoomCode = msg.code;
    round = msg.round || 1;
    latestPlayers = msg.players;
    const me = latestPlayers.find(p => p.id === myId);
    totalScore = me ? me.score : 0;
    document.getElementById("score").textContent = totalScore;
    document.getElementById("round").textContent = Math.max(round, 1);
    renderInGamePlayers();

    if (msg.phase === "lobby") {
      document.getElementById("game").style.display = "none";
      document.getElementById("player-list").style.display = "none";
      document.getElementById("start-screen").style.display = "flex";
      showLobby();
      document.getElementById("lobby-create").style.display = "none";
      document.getElementById("lobby-join").previousElementSibling.style.display = "none";
      document.getElementById("lobby-join").style.display = "none";
      document.getElementById("lobby-waiting").style.display = "flex";
      document.getElementById("lobby-code").textContent = msg.code;
      document.getElementById("host-start-btn").style.display = myId === hostId ? "inline-block" : "none";
      document.getElementById("lobby-status").textContent = "Waiting for host to start...";
    } else {
      document.getElementById("start-screen").style.display = "none";
      document.getElementById("game").style.display = "block";
      document.getElementById("player-list").style.display = "block";
      if (!map) initMap();

      if (msg.phase === "round") {
        document.getElementById("loading").style.display = "flex";
        document.getElementById("loading").textContent = "Loading street view...";
        loadImageIntoViewer(msg.imageId, msg.alreadyGuessed);
        startTimer(msg.timeLeft || 0);
      } else {
        document.getElementById("loading").style.display = "none";
        document.getElementById("result").style.display = "flex";
        document.getElementById("result-title").textContent = "Between rounds";
        document.getElementById("result-detail").textContent = "Waiting for the host to continue...";
        document.getElementById("results-table").style.display = "none";
        enterResultMapView();
        const btn = document.getElementById("next-btn");
        if (myId === hostId) {
          btn.style.display = "inline-block";
          btn.textContent = "Continue";
          btn.onclick = () => { ws.send(JSON.stringify({ type: "start_round" })); document.getElementById("result").style.display = "none"; exitResultMapView(); };
        } else {
          btn.style.display = "none";
        }
      }
    }
  }

  else if (msg.type === "rejoin_failed") {
    clearMPSession();
    document.getElementById("game").style.display = "none";
    document.getElementById("player-list").style.display = "none";
    document.getElementById("start-screen").style.display = "flex";
  }

  else if (msg.type === "players") {
    latestPlayers = msg.players;
    hostId = msg.hostId;
    renderLobbyPlayers();
    renderInGamePlayers();
    if (myId === hostId) document.getElementById("host-start-btn").style.display = "inline-block";
  }

  else if (msg.type === "round_loading") {
    if (document.getElementById("game").style.display !== "block") {
      document.getElementById("start-screen").style.display = "none";
      document.getElementById("game").style.display = "block";
      document.getElementById("player-list").style.display = "block";
      if (!map) initMap();
    }
    stopTimer();
    document.getElementById("guess-btn").disabled = false;
    document.getElementById("loading").style.display = "flex";
    document.getElementById("loading").textContent = "Loading next location...";
    document.getElementById("round").textContent = msg.round;
    hasGuessedThisRound = false;
    // The result screen from the round that just ended was never actually
    // dismissed for anyone (only a special-case button handled it) — make
    // sure every client (host and joiners) drops it once the next round loads.
    document.getElementById("result").style.display = "none";
    exitResultMapView();
    resetMapMarkers();
  }

  else if (msg.type === "round_start") {
    document.getElementById("round").textContent = msg.round;
    loadImageIntoViewer(msg.imageId);
    startTimer(msg.timeLeft || 60000);
  }

  else if (msg.type === "round_result") {
    stopTimer();
    showMultiplayerResult(msg);
  }

  else if (msg.type === "game_over") {
    stopTimer();
    clearMPSession();
    showMultiplayerGameOver(msg);
  }

  else if (msg.type === "error") {
    alert(msg.message);
  }
}

function renderLobbyPlayers() {
  const el = document.getElementById("lobby-players");
  if (!el) return;
  el.innerHTML = latestPlayers.map(p => `${p.name}${p.id === hostId ? " (host)" : ""}`).join("<br>");
}

function renderInGamePlayers() {
  const el = document.getElementById("player-list");
  if (!isMultiplayer) return;
  el.innerHTML = latestPlayers
    .map(p => `<div class="player-row${p.id === hostId ? ' host' : ''}"><span>${p.name}</span><span class="${p.guessed ? 'guessed' : ''}">${p.guessed ? 'guessed' : p.score}</span></div>`)
    .join("");
}

function loadImageIntoViewer(imageId, alreadyGuessed) {
  const status = document.getElementById("loading");
  hasGuessedThisRound = !!alreadyGuessed;
  document.getElementById("guess-btn").disabled = hasGuessedThisRound;
  if (hasGuessedThisRound) {
    status.style.display = "flex";
    status.textContent = "Guess submitted — waiting for other players...";
  }
  mountViewer(imageId, {
    onImage: () => {
      if (!hasGuessedThisRound) status.style.display = "none";
    }
  });
}

function resetMapMarkers() {
  if (!map) return;
  if (guessMarker) { map.removeLayer(guessMarker); guessMarker = null; }
  if (actualMarker) { map.removeLayer(actualMarker); actualMarker = null; }
  if (connectLine) { map.removeLayer(connectLine); connectLine = null; }
  map.setView([20, 0], 2);
}

// The mini-map expands to fill most of the screen while results are shown,
// so you can actually see your guess vs. the real location instead of it
// being hidden behind a full-screen results overlay.
function enterResultMapView() {
  document.getElementById('map-wrap').classList.add('result-view');
  if (map) map.invalidateSize();
  // The round is already decided once results are showing — walking around
  // or looking around further would be harmless (you can't guess again) but
  // still shouldn't be possible, so disable and hide the nav arrows, and
  // block all interaction with the photo (including Mapillary's own
  // drag-to-look-around) until the next round.
  roundActive = false;
  renderNavArrows(); // clears the layer while roundActive is false
  document.getElementById('photo-panel').style.pointerEvents = 'none';
}
function exitResultMapView() {
  document.getElementById('map-wrap').classList.remove('result-view');
  if (map) map.invalidateSize();
  roundActive = true;
  document.getElementById('photo-panel').style.pointerEvents = '';
}

function showMultiplayerResult(msg) {
  const me = msg.results.find(r => r.id === myId);
  document.getElementById("result-title").textContent = me && me.dist != null
    ? `${Math.round(me.dist)} km away`
    : "No guess submitted";
  document.getElementById("result-detail").textContent = me ? `+${me.points} points this round` : "";

  const table = document.getElementById("results-table");
  table.style.display = "table";
  const sorted = [...msg.results].sort((a, b) => b.total - a.total);
  table.innerHTML = sorted.map(r =>
    `<tr><td>${r.name}</td><td>${r.dist != null ? Math.round(r.dist) + ' km' : '—'}</td><td>+${r.points}</td><td><b>${r.total}</b></td></tr>`
  ).join("");

  enterResultMapView();
  if (msg.actual && map) {
    resetMapMarkers();
    actualMarker = L.marker([msg.actual.lat, msg.actual.lon], {
      icon: L.divIcon({ className: '', html: '<div style="width:12px;height:12px;background:#ef4444;border-radius:50%;border:2px solid white"></div>' })
    }).addTo(map);
    map.setView([msg.actual.lat, msg.actual.lon], 4);
  }

  const btn = document.getElementById("next-btn");
  if (myId === hostId) {
    btn.style.display = "inline-block";
    btn.textContent = msg.round >= msg.maxRounds ? "See final results" : "Next round";
    btn.onclick = () => {
      ws.send(JSON.stringify({ type: "start_round" }));
      document.getElementById("result").style.display = "none";
      exitResultMapView();
    };
  } else {
    btn.style.display = "none";
  }
  document.getElementById("result").style.display = "flex";
}

function showMultiplayerGameOver(msg) {
  document.getElementById("result").style.display = "flex";
  enterResultMapView();
  document.getElementById("result-title").textContent = "Game over";
  document.getElementById("result-detail").textContent = "";
  const table = document.getElementById("results-table");
  table.style.display = "table";
  const sorted = [...msg.players].sort((a, b) => b.score - a.score);
  table.innerHTML = sorted.map((p, i) => `<tr><td>#${i + 1}</td><td>${p.name}</td><td><b>${p.score}</b></td></tr>`).join("");
  const btn = document.getElementById("next-btn");
  btn.style.display = "none";
}

function submitGuessMultiplayer() {
  if (!guessMarker) { alert("Click the map to place a guess first"); return; }
  if (hasGuessedThisRound) return;
  hasGuessedThisRound = true;
  document.getElementById("guess-btn").disabled = true;
  const guess = guessMarker.getLatLng();
  ws.send(JSON.stringify({ type: "submit_guess", lat: guess.lat, lon: guess.lng }));
  document.getElementById("loading").style.display = "flex";
  document.getElementById("loading").textContent = "Guess submitted — waiting for other players...";
}

function initMap() {
  // Without maxBounds, Leaflet lets you keep panning past +/-180deg into a
  // repeated copy of the world map — a click there returns a raw longitude
  // outside -180..180 (e.g. 200 instead of -160), which throws off both the
  // guess marker's position and the line drawn to the actual location.
  // Locking to a single world copy (plus wrap() as a defensive fallback)
  // keeps every click a normal, real-world coordinate.
  map = L.map('map', {
    maxBounds: [[-90, -180], [90, 180]],
    maxBoundsViscosity: 1.0,
  }).setView([20, 0], 2);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 18, noWrap: true }).addTo(map);
  map.on('click', (e) => {
    // Once results are showing, the guess is already scored — clicking the
    // (still-zoomable) result map shouldn't be able to move the pin anymore.
    if (!roundActive) return;
    if (guessMarker) map.removeLayer(guessMarker);
    guessMarker = L.marker(e.latlng.wrap()).addTo(map);
  });
  const wrap = document.getElementById('map-wrap');
  wrap.addEventListener('mouseenter', () => setTimeout(() => map.invalidateSize(), 210));
  wrap.addEventListener('mouseleave', () => setTimeout(() => map.invalidateSize(), 210));
  // Touch devices don't get :hover, so tap-to-expand toggles a class instead.
  // Registered on the CAPTURE phase (and stopped there) so the very first tap
  // only expands the map — without this, that same click already reaches
  // Leaflet's own click handler on the way down/up and places a guess at
  // whatever imprecise spot the tiny collapsed map happened to be showing,
  // before the user ever gets to see the expanded view.
  const supportsHover = window.matchMedia('(hover: hover)').matches;
  wrap.addEventListener('click', (e) => {
    if (!supportsHover && !wrap.classList.contains('expanded')) {
      e.stopPropagation();
      wrap.classList.add('expanded');
      setTimeout(() => map.invalidateSize(), 210);
    }
  }, true);
  document.addEventListener('click', (e) => {
    if (wrap.classList.contains('expanded') && !wrap.contains(e.target)) {
      wrap.classList.remove('expanded');
      setTimeout(() => map.invalidateSize(), 210);
    }
  });
}

function submitGuess(forced) {
  if (!guessMarker) {
    if (!forced) { alert("Click the map to place a guess first"); return; }
    stopTimer();
    document.getElementById("results-table").style.display = "none";
    document.getElementById("next-btn").style.display = "inline-block";
    document.getElementById("result-title").textContent = "Time's up!";
    document.getElementById("result-detail").textContent = `+0 points · Total: ${totalScore}`;
    document.getElementById("result").style.display = "flex";
    enterResultMapView();
    return;
  }
  stopTimer();
  const guess = guessMarker.getLatLng();
  const dist = haversine(guess.lat, guess.lng, currentCoords.lat, currentCoords.lon);
  const points = scoreFromDistance(dist);
  totalScore += points;
  document.getElementById("score").textContent = totalScore;
  saveSoloSession();

  document.getElementById("result").style.display = "flex";
  enterResultMapView();
  actualMarker = L.marker([currentCoords.lat, currentCoords.lon], {
    icon: L.divIcon({ className: '', html: '<div style="width:12px;height:12px;background:#ef4444;border-radius:50%;border:2px solid white"></div>' })
  }).addTo(map);
  connectLine = L.polyline([guess, [currentCoords.lat, currentCoords.lon]], { color: '#ef4444', dashArray: '4' }).addTo(map);
  map.fitBounds(connectLine.getBounds(), { padding: [40, 40] });

  document.getElementById("results-table").style.display = "none";
  document.getElementById("next-btn").style.display = "inline-block";
  document.getElementById("result-title").textContent = `${Math.round(dist)} km away`;
  document.getElementById("result-detail").textContent = `+${points} points · Total: ${totalScore}`;
}

function nextRound() {
  document.getElementById("result").style.display = "none";
  exitResultMapView();
  if (guessMarker) { map.removeLayer(guessMarker); guessMarker = null; }
  if (actualMarker) { map.removeLayer(actualMarker); actualMarker = null; }
  if (connectLine) { map.removeLayer(connectLine); connectLine = null; }
  map.setView([20, 0], 2);

  round++;
  if (round > MAX_ROUNDS) {
    clearSoloSession();
    document.getElementById("result-title").textContent = "Game over";
    document.getElementById("result-detail").textContent = `Final score: ${totalScore} / ${MAX_ROUNDS * 5000}`;
    document.getElementById("result").style.display = "flex";
    const btn = document.getElementById("next-btn");
    btn.textContent = "Play again";
    btn.onclick = () => {
      round = 1; totalScore = 0;
      document.getElementById("score").textContent = 0;
      document.getElementById("result").style.display = "none";
      btn.textContent = "Next round";
      btn.onclick = nextRound;
      loadRound();
    };
    return;
  }
  loadRound();
}

function startGame() {
  if (!TOKEN.startsWith("MLY|")) {
    alert("Set your token in the TOKEN constant near the top of the script first.");
    return;
  }
  clearSoloSession();
  isMultiplayer = false;
  round = 1; totalScore = 0;
  document.getElementById("score").textContent = 0;
  document.getElementById("start-screen").style.display = "none";
  document.getElementById("game").style.display = "block";
  document.getElementById("player-list").style.display = "none";
  if (!map) initMap();
  loadRound();
}

function resumeSoloSession(solo) {
  isMultiplayer = false;
  round = solo.round || 1;
  totalScore = solo.totalScore || 0;
  document.getElementById("start-screen").style.display = "none";
  document.getElementById("game").style.display = "block";
  document.getElementById("player-list").style.display = "none";
  document.getElementById("score").textContent = totalScore;
  document.getElementById("round").textContent = round;
  document.getElementById("guess-btn").disabled = false;
  if (!map) initMap();

  const status = document.getElementById("loading");
  status.style.display = "flex";
  status.textContent = "Loading street view...";
  currentCoords = (solo.lat != null && solo.lon != null) ? { lat: solo.lat, lon: solo.lon } : null;
  mountViewer(solo.imageId, { onImage: () => { status.style.display = "none"; saveSoloSession(); } });
  startTimer(SOLO_TIMEOUT_MS);
}

function showLobby() {
  document.getElementById("lobby").style.display = "flex";
  document.getElementById("start-btn").style.display = "none";
  document.getElementById("friends-btn").style.display = "none";
}

function leaveGame() {
  if (!confirm("Leave the game?")) return;
  stopTimer();
  if (isMultiplayer && ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: "leave_room" }));
    ws.close();
  }
  clearMPSession();
  clearSoloSession();
  resetToStartScreen();
}

function resetToStartScreen() {
  isMultiplayer = false;
  myId = null; hostId = null; currentRoomCode = null; myToken = null;
  latestPlayers = [];
  hasGuessedThisRound = false;
  round = 1; totalScore = 0;
  document.getElementById("score").textContent = 0;
  document.getElementById("round").textContent = 1;
  currentImageId = null; currentCoords = null;

  // Fully tear down the map/viewer instead of just hiding them — Leaflet
  // refuses to re-initialize a container that still has a live map bound to it.
  if (mlyViewer) { try { mlyViewer.remove(); } catch {} mlyViewer = null; }
  if (map) { try { map.remove(); } catch {} map = null; }
  guessMarker = null; actualMarker = null; connectLine = null;
  document.getElementById('map-wrap').classList.remove('result-view', 'expanded');

  document.getElementById("game").style.display = "none";
  document.getElementById("player-list").style.display = "none";
  document.getElementById("result").style.display = "none";

  document.getElementById("lobby").style.display = "none";
  document.getElementById("lobby-create").style.display = "block";
  document.getElementById("lobby-join").style.display = "block";
  document.getElementById("lobby-join").previousElementSibling.style.display = "block";
  document.getElementById("lobby-waiting").style.display = "none";
  document.getElementById("start-btn").style.display = "inline-block";
  document.getElementById("friends-btn").style.display = "inline-block";

  document.getElementById("start-screen").style.display = "flex";
}

function requireName() {
  const input = document.getElementById("name-input");
  const name = input.value.trim();
  if (!name) {
    alert("Enter your name first");
    input.focus();
    return null;
  }
  return name;
}

function createRoom() {
  const name = requireName();
  if (!name) return;
  myName = name;
  isMultiplayer = true;
  connectWS(() => ws.send(JSON.stringify({ type: "create_room", name })));
}

function joinRoom(codeOverride) {
  const name = requireName();
  if (!name) return;
  const code = codeOverride || document.getElementById("join-code-input").value.trim().toUpperCase();
  if (!code) { alert("Enter a room code"); return; }
  myName = name;
  isMultiplayer = true;
  connectWS(() => ws.send(JSON.stringify({ type: "join_room", name, code })));
}

function attemptRejoin(session) {
  myName = session.name || "Player";
  isMultiplayer = true;
  document.getElementById("start-screen").style.display = "none";
  document.getElementById("game").style.display = "block";
  document.getElementById("player-list").style.display = "block";
  document.getElementById("loading").style.display = "flex";
  document.getElementById("loading").textContent = "Reconnecting...";
  if (!map) initMap();
  connectWS(() => ws.send(JSON.stringify({ type: "rejoin", code: session.code, token: session.token })));
}

document.getElementById("start-btn").addEventListener("click", startGame);
document.getElementById("friends-btn").addEventListener("click", showLobby);
document.getElementById("create-room-btn").addEventListener("click", createRoom);
document.getElementById("join-room-btn").addEventListener("click", () => joinRoom());
document.getElementById("host-start-btn").addEventListener("click", () => {
  ws.send(JSON.stringify({ type: "start_round" }));
  document.getElementById("host-start-btn").style.display = "none";
  document.getElementById("lobby-status").textContent = "Starting...";
});
document.getElementById("copy-link-btn").addEventListener("click", () => {
  const link = document.getElementById("lobby-link").textContent;
  if (!link) return;
  navigator.clipboard.writeText(link).then(() => {
    const btn = document.getElementById("copy-link-btn");
    const old = btn.textContent;
    btn.textContent = "Copied!";
    setTimeout(() => { btn.textContent = old; }, 1500);
  }).catch(() => {});
});
document.getElementById("guess-btn").addEventListener("click", () => {
  if (isMultiplayer) submitGuessMultiplayer(); else submitGuess();
});
document.getElementById("leave-btn").addEventListener("click", leaveGame);
document.getElementById("lobby-leave-btn").addEventListener("click", leaveGame);
document.getElementById("result-leave-btn").addEventListener("click", leaveGame);
document.getElementById("next-btn").addEventListener("click", () => {
  if (!isMultiplayer) nextRound();
  // multiplayer next-btn's onclick is set dynamically in showMultiplayerResult
});

// On load: a shared room link takes priority, then a saved multiplayer
// session (rejoin in place), then a saved solo session (resume same photo).
(function initSession() {
  const params = new URLSearchParams(location.search);
  const roomCode = params.get("room");
  if (roomCode) {
    showLobby();
    document.getElementById("join-code-input").value = roomCode.toUpperCase();
    return;
  }
  const mp = loadMPSession();
  if (mp && mp.code && mp.token) {
    attemptRejoin(mp);
    return;
  }
  const solo = loadSoloSession();
  if (solo && solo.imageId) {
    resumeSoloSession(solo);
  }
})();
</script>

</body>
