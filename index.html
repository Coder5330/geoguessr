<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Geoguessr</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://unpkg.com/mapillary-js@4.1.2/dist/mapillary.css" rel="stylesheet" />
<script src="https://unpkg.com/mapillary-js@4.1.2/dist/mapillary.js"></script>
<style>
  :root {
    --bg: #0b0e14;
    --panel: #171b24;
    --panel-2: #1f2430;
    --border: #2a3040;
    --text: #f2f3f5;
    --text-dim: #9aa3b2;
    --accent: #22c55e;
    --accent-hover: #1ba750;
    --accent-2: #8b5cf6;
    --danger: #ef4444;
    --warn: #f59e0b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text);
    height: 100vh; overflow: hidden;
  }
  h1, h2 { font-weight: 800; }

  #start-screen {
    position: fixed; inset: 0;
    background: radial-gradient(circle at 50% 20%, #151a24 0%, var(--bg) 70%);
    display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 14px;
    z-index: 1000; padding: 20px; text-align: center;
    overflow: hidden;
  }
  /* Soft brand-colored glows plus a faint dot-grid "map" texture, masked to
     fade out toward the edges — fills the otherwise empty backdrop without a
     full redesign. z-index:-1 keeps it behind all real content but above the
     element's own base gradient. */
  #start-screen::before {
    content: ''; position: absolute; inset: 0; z-index: -1;
    background:
      radial-gradient(circle at 14% 20%, rgba(34,197,94,0.18), transparent 40%),
      radial-gradient(circle at 86% 78%, rgba(139,92,246,0.18), transparent 40%),
      radial-gradient(rgba(255,255,255,0.07) 1px, transparent 1px);
    background-size: auto, auto, 30px 30px;
    mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, black 40%, transparent 85%);
    -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, black 40%, transparent 85%);
  }
  #start-screen h1 { margin: 0; font-size: 42px; letter-spacing: -0.5px; }
  #start-screen h1 span { color: var(--accent); }
  #logo { width: 72px; height: auto; margin-bottom: 4px; }
  #start-screen input {
    width: 320px; max-width: 90vw; padding: 12px 14px; font-size: 14px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--panel); color: var(--text); text-align: center;
    outline: none;
  }
  #start-screen input:focus { border-color: var(--accent); }

  .btn {
    padding: 13px 30px; font-size: 15px; font-weight: 700; border-radius: 999px; border: none;
    background: var(--accent); color: #06210f; cursor: pointer; transition: transform 0.08s ease, background 0.15s ease;
  }
  .btn:hover { background: var(--accent-hover); }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { background: #3a4152; color: #6b7280; cursor: not-allowed; transform: none; }
  .btn-secondary { background: var(--accent-2); color: #fff; }
  .btn-secondary:hover { background: #7c4de0; }
  .btn-ghost {
    background: transparent; color: var(--text-dim); border: 1px solid var(--border); padding: 8px 16px; font-size: 13px;
    cursor: pointer; margin-top: 4px;
  }
  .btn-ghost:hover { background: var(--panel-2); color: var(--text); }

  #game { display: none; height: 100vh; position: relative; background: #000; }
  #photo-panel { height: 100vh; background: #000; position: relative; }
  #mly { width: 100%; height: 100%; }
  #loading {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 15px; color: var(--text-dim); text-align: center; padding: 20px; z-index: 5; background: rgba(0,0,0,0.85);
  }

  #map-wrap {
    position: absolute; bottom: 18px; right: 18px; width: 200px; height: 140px;
    border-radius: 14px; overflow: hidden; box-shadow: 0 8px 30px rgba(0,0,0,0.6);
    border: 3px solid var(--accent); z-index: 600; cursor: pointer;
    transition: width 0.2s ease, height 0.2s ease;
  }
  #map-wrap:hover, #map-wrap.expanded { width: 46vw; height: 46vh; }
  /* While results are showing, the map takes over most of the screen so you
     can actually see your guess vs. the real location — the result bar below
     only takes up the bottom strip instead of covering everything. */
  #map-wrap.result-view {
    top: 16px; left: 16px; right: 16px; bottom: 190px; width: auto; height: auto; z-index: 700; cursor: default;
  }
  #map { width: 100%; height: 100%; }

  /* A single flex row spanning the full width, instead of independently
     absolute-positioned pieces (HUD pills anchored left, timer centered via
     left:50%) — on narrow phone screens the HUD row's width alone could
     exceed half the screen and collide with the centered timer. Flex with
     wrap keeps everything laid out relative to each other so nothing overlaps,
     and lets pieces wrap to a second line if they truly don't fit. */
  /* Mapillary's own viewer draws its built-in controls (compass, zoom,
     sequence arrows) somewhere inside #mly, underneath these overlays. Round/
     Score/Timer are purely informational — they have no click handlers — so
     they're click-through by default; only the Leave button opts back in to
     receiving clicks. This way our HUD never blocks Mapillary's controls
     no matter where it decides to place them. */
  #hud {
    position: absolute; top: 14px; left: 14px; right: 14px; z-index: 500;
    display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap;
    pointer-events: none;
  }
  .hud-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .hud-pill {
    background: rgba(15,18,25,0.85); backdrop-filter: blur(6px); padding: 8px 16px; border-radius: 999px;
    font-size: 14px; font-weight: 600; border: 1px solid var(--border); white-space: nowrap;
  }
  .hud-pill b, .hud-pill #score, .hud-pill #round { color: var(--accent); }
  .hud-leave {
    cursor: pointer; color: #fca5a5; background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.4);
    pointer-events: auto;
  }
  .hud-leave:hover { background: rgba(239,68,68,0.3); }

  #timer {
    z-index: 500; pointer-events: none; position: relative; top: 50px;
    background: rgba(15,18,25,0.85); backdrop-filter: blur(6px); border: 1px solid var(--border);
    border-radius: 999px; padding: 8px 18px; font-size: 16px; font-weight: 800; font-variant-numeric: tabular-nums;
    color: var(--accent); transition: color 0.2s ease, border-color 0.2s ease;
  }
  #timer.timer-warn { color: var(--warn); border-color: var(--warn); }
  #timer.timer-danger { color: var(--danger); border-color: var(--danger); animation: pulse 1s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

  #guess-btn {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 600;
    padding: 15px 46px; font-size: 16px; box-shadow: 0 6px 20px rgba(34,197,94,0.35);
  }

  /* Two-tier movement cue, replacing Mapillary's built-in direction arrows
     (which faded in/out unpredictably as edge data loaded):
     1. .nav-slot — plain arrows clustered in a plus/cross layout above the
        Guess button, directly clickable, indicating which directions
        currently exist.
     2. #nav-hover — an additional interactive cue: a styled circular badge
        that follows the cursor while hovering the photo and only appears
        over a zone that has a navigable direction; clicking moves there.
     Which real direction occupies each of the four zones (up/down/left/
     right) is recomputed from that edge's real-world bearing relative to
     your current view bearing, so it stays correct as you drag to look
     around — see the nav-* JS below. */
  .nav-slot {
    position: absolute; display: none; z-index: 50; width: 28px; cursor: pointer;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.7));
  }
  .nav-slot:hover { filter: drop-shadow(0 2px 4px rgba(0,0,0,0.7)) brightness(1.4); }
  /* Plus/cross arrangement:
        up
     left  right
        down
  */
  #nav-up { bottom: 142px; left: 50%; transform: translateX(-50%) rotate(180deg); }
  #nav-down { bottom: 92px; left: 50%; transform: translateX(-50%) rotate(0deg); }
  #nav-left { bottom: 117px; left: calc(50% - 40px); transform: translateX(-50%) rotate(90deg); }
  #nav-right { bottom: 117px; left: calc(50% + 40px); transform: translateX(-50%) rotate(270deg); }

  #nav-hover {
    position: absolute; display: none; z-index: 55; pointer-events: none;
    width: 72px; height: 72px; border-radius: 50%;
    align-items: center; justify-content: center;
    background: rgba(255,255,255,0.25); border: 2px solid rgba(255,255,255,0.15);
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.6));
  }
  #nav-hover img {
    width: 30px;
    /* arrow.png is solid white on transparent — brightness() scales the RGB
       channels down to a dark grey without touching the alpha/transparency. */
    filter: brightness(0.35);
  }

  #result {
    position: fixed; left: 0; right: 0; bottom: 0; background: rgba(10,12,18,0.97);
    backdrop-filter: blur(8px); border-top: 1px solid var(--border);
    display: none; align-items: center; justify-content: center;
    flex-direction: column; gap: 8px; z-index: 900; text-align: center; padding: 18px 20px;
  }
  #result-card {
    display: flex; flex-direction: column; gap: 8px; align-items: center; max-width: 480px; width: 100%;
  }
  #result h2 { margin: 0; font-size: 30px; }
  #result p { margin: 0; color: var(--text-dim); }
  #result-comment {
    font-style: italic; font-size: 13px; color: var(--text);
    background: rgba(255,255,255,0.06); border-radius: 999px; padding: 6px 16px;
  }
  #result-comment:empty { display: none; }
  #results-table { width: 100%; max-width: 360px; text-align: left; font-size: 14px; border-collapse: collapse; margin-top: 6px; }
  #results-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); }
  #results-table tr:first-child td { color: var(--accent); font-weight: 700; }

  #lobby { display: none; flex-direction: column; gap: 16px; align-items: center; }
  #lobby input { text-transform: none; }
  #lobby-code {
    font-size: 34px; letter-spacing: 8px; font-weight: 800; background: var(--panel); padding: 12px 24px;
    border-radius: 10px; border: 1px solid var(--border); color: var(--accent);
  }
  #lobby-link-row { display: flex; gap: 8px; align-items: center; max-width: 360px; }
  #lobby-link { font-size: 12px; color: var(--text-dim); word-break: break-all; }
  .divider { color: #4a5164; font-size: 13px; }

  #player-list {
    position: absolute; top: 14px; right: 16px; background: rgba(15,18,25,0.85); backdrop-filter: blur(6px);
    padding: 12px 16px; border-radius: 12px; font-size: 13px; z-index: 500; min-width: 150px;
    border: 1px solid var(--border); pointer-events: none;
  }
  #player-list .player-row { display: flex; justify-content: space-between; gap: 12px; padding: 4px 0; }
  #player-list .player-row.host span:first-child::before { content: "\1F451 "; }
  #player-list .guessed { color: var(--accent); font-weight: 600; }

  @media (max-width: 700px) {
    #start-screen h1 { font-size: 30px; }
    #start-screen input { width: 100%; }
    .hud-pill { padding: 6px 11px; font-size: 12px; }
    #player-list { padding: 8px 10px; font-size: 11px; min-width: 100px; }
    #map-wrap { width: 110px; height: 80px; bottom: 90px; right: 10px; border-width: 2px; }
    #map-wrap:hover { width: 110px; height: 80px; }
    #map-wrap.expanded { width: 78vw; height: 46vh; }
    #map-wrap.result-view { top: 10px; left: 10px; right: 10px; bottom: 230px; }
    #guess-btn { padding: 12px 30px; font-size: 14px; bottom: 14px; }
    #timer { font-size: 13px; padding: 6px 12px; top: 40px; }
    #result { padding: 14px 16px; }
    .nav-slot { width: 22px; }
    #nav-up { bottom: 108px; }
    #nav-down { bottom: 68px; }
    #nav-left, #nav-right { bottom: 88px; }
    #nav-left { left: calc(50% - 30px); }
    #nav-right { left: calc(50% + 30px); }
    #nav-hover { width: 54px; height: 54px; }
    #nav-hover img { width: 22px; }
  }

  /* Custom toast — replaces native alert() so messages match the app's look
     instead of a jarring browser-native popup. */
  #toast {
    position: fixed; top: 24px; left: 50%; z-index: 2000;
    transform: translateX(-50%) translateY(-16px);
    display: flex; align-items: center; gap: 10px;
    background: var(--panel); border: 1px solid var(--border); color: var(--text);
    padding: 13px 20px; border-radius: 10px; font-size: 14px; font-weight: 600;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    opacity: 0; pointer-events: none; max-width: min(90vw, 420px); text-align: center;
    transition: opacity 0.2s ease, transform 0.2s ease;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.toast-error { border-color: var(--danger); }
  #toast.toast-error::before { content: ''; width: 8px; height: 8px; border-radius: 50%; background: var(--danger); flex-shrink: 0; }

  /* In-game Menu button — was easy to miss since it looked like the plain
     informational Round/Score pills. Given its own accent color (matching
     the "Play with friends" purple) so it visibly reads as a real control. */
  /* #hud is pointer-events:none so its informational pills don't block
     Mapillary's own controls underneath — .hud-leave already opts back in
     for the Leave button; #menu-wrap needs the same for the Menu button
     AND its dropdown (music/account/leaderboard), or all of it is just
     visually there but unclickable. */
  #menu-wrap { position: relative; pointer-events: auto; }
  .hud-menu { color: #ddd6fe; background: rgba(139,92,246,0.28); border: 1px solid rgba(139,92,246,0.6); }
  .hud-menu:hover { background: rgba(139,92,246,0.4); }
  #menu-dropdown {
    display: none; position: absolute; top: calc(100% + 8px); left: 0; z-index: 550;
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5); padding: 6px; min-width: 170px;
  }
  #menu-dropdown.open { display: block; }
  .menu-dropdown-item {
    display: block; width: 100%; text-align: left; background: none; border: none; color: var(--text);
    padding: 8px 10px; border-radius: 6px; font-size: 13px; cursor: pointer;
  }
  .menu-dropdown-item:hover { background: var(--panel-2); }

  #auth-modal, #leaderboard-modal {
    position: fixed; inset: 0; z-index: 2100; display: none;
    align-items: center; justify-content: center; background: rgba(6,8,12,0.85);
  }
  #auth-modal.open, #leaderboard-modal.open { display: flex; }
  #auth-card, #leaderboard-card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 16px;
    padding: 28px 32px; display: flex; flex-direction: column; gap: 12px; align-items: center;
    max-width: 340px; width: 100%; text-align: center;
  }
  #auth-card input {
    width: 100%; padding: 10px 14px; font-size: 14px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--bg); color: var(--text); text-align: center;
  }
  #leaderboard-card { max-width: 380px; }
  #leaderboard-table { width: 100%; text-align: left; font-size: 14px; border-collapse: collapse; }
  #leaderboard-table td { padding: 7px 10px; border-bottom: 1px solid var(--border); }
  #leaderboard-table tr:first-child td { color: var(--accent); font-weight: 700; }
</style>
</head>
<body>

<div id="toast"></div>

<div id="auth-modal">
  <div id="auth-card">
    <h2 id="auth-title">Sign Up</h2>
    <input id="auth-username" type="text" placeholder="Username" maxlength="20" autocomplete="username" />
    <input id="auth-password" type="password" placeholder="Password" maxlength="100" autocomplete="current-password" />
    <button class="btn" id="auth-submit-btn">Sign Up</button>
    <button class="btn-ghost" id="auth-switch-btn">Already have an account? Log in</button>
    <button class="btn-ghost" id="auth-close-btn">Cancel</button>
  </div>
</div>

<div id="leaderboard-modal">
  <div id="leaderboard-card">
    <h2 style="margin:0;">🏆 Leaderboard</h2>
    <table id="leaderboard-table"></table>
    <button class="btn-ghost" id="leaderboard-close-btn">Close</button>
  </div>
</div>
<audio id="bg-music" src="assets/music.mp3" loop preload="auto"></audio>

<div id="start-screen">
  <button id="start-music-toggle" class="btn-ghost" style="position:absolute; top:14px; right:14px;">🔊 Music</button>
  <img src="assets/logo.png" alt="" id="logo" />
  <h1>Geo<span>Guessr</span></h1>
  <p style="color:var(--text-dim); max-width:420px; font-size:14px">Walk around a real street using the arrows, then guess where you are on the map.</p>
  <button class="btn" id="start-btn">Play solo</button>
  <div class="divider" id="start-divider">or</div>
  <button class="btn btn-secondary" id="friends-btn">Play with friends</button>
  <button class="btn-ghost" id="practice-btn" style="margin-top:2px;">Practice mode (no timer)</button>
  <div id="start-account-row" style="display:flex; gap:8px; margin-top:6px;">
    <button class="btn-ghost" id="account-btn">👤 Sign in / Sign up</button>
    <button class="btn-ghost" id="leaderboard-btn">🏆 Leaderboard</button>
  </div>

  <div id="name-prompt" style="display:none; flex-direction:column; gap:12px; align-items:center;">
    <p style="color:var(--text-dim); font-size:14px; margin:0;">What should we call you?</p>
    <input id="player-name-input" type="text" placeholder="Your name" maxlength="20" />
    <button class="btn" id="save-name-btn">Continue</button>
  </div>

  <div id="lobby">
    <div id="lobby-create">
      <button class="btn" id="create-room-btn">Create room</button>
    </div>
    <div class="divider">or</div>
    <div id="lobby-join">
      <input id="join-code-input" type="text" placeholder="Room code" maxlength="5" style="text-transform:uppercase" />
      <button class="btn" id="join-room-btn" style="margin-top:8px">Join room</button>
    </div>
    <div id="lobby-waiting" style="display:none; flex-direction:column; align-items:center; gap:12px;">
      <div id="lobby-code"></div>
      <div id="lobby-link-row">
        <div id="lobby-link"></div>
        <button class="btn-ghost" id="copy-link-btn" style="display:none; border-radius:6px; padding:4px 10px; font-size:11px; cursor:pointer;">Copy</button>
      </div>
      <div id="lobby-players" style="font-size:14px; color:#ccc;"></div>
      <button class="btn" id="host-start-btn" style="display:none">Start game</button>
      <p id="lobby-status" style="font-size:13px; color:var(--text-dim)">Waiting for host to start...</p>
      <button class="btn-ghost" id="lobby-leave-btn">Leave</button>
    </div>
  </div>
</div>

<div id="game">
  <div id="hud">
    <div class="hud-group">
      <div class="hud-pill">Round <span id="round">1</span>/5</div>
      <div class="hud-pill">Score <span id="score">0</span></div>
    </div>
    <div id="timer" style="display:none">60</div>
    <div class="hud-group">
      <div id="menu-wrap">
        <button id="menu-btn" class="hud-pill hud-menu">Menu ⋮</button>
        <div id="menu-dropdown">
          <button id="menu-music-toggle" class="menu-dropdown-item">🔊 Music: On</button>
          <button id="menu-account-btn" class="menu-dropdown-item">👤 Sign in / Sign up</button>
          <button id="menu-leaderboard-btn" class="menu-dropdown-item">🏆 Leaderboard</button>
        </div>
      </div>
      <button id="leave-btn" class="hud-pill hud-leave">Leave</button>
    </div>
  </div>
  <div id="player-list" style="display:none"></div>
  <div id="photo-panel">
    <div id="loading">Loading street view...</div>
    <div id="mly"></div>
    <img id="nav-up" class="nav-slot" src="assets/arrow.png" alt="" />
    <img id="nav-down" class="nav-slot" src="assets/arrow.png" alt="" />
    <img id="nav-left" class="nav-slot" src="assets/arrow.png" alt="" />
    <img id="nav-right" class="nav-slot" src="assets/arrow.png" alt="" />
    <div id="nav-hover"><img src="assets/arrow.png" alt="" /></div>
  </div>
  <button id="guess-btn" class="btn">Guess</button>
  <div id="map-wrap"><div id="map"></div></div>
</div>

<div id="result">
  <div id="result-card">
    <h2 id="result-title"></h2>
    <p id="result-detail"></p>
    <p id="result-comment"></p>
    <table id="results-table" style="display:none"></table>
    <button class="btn" id="next-btn">Next round</button>
    <button class="btn-ghost" id="signup-btn">👤 Sign up to save your score!</button>
    <button class="btn-ghost" id="result-leave-btn">Leave</button>
  </div>
</div>

<script>
// Custom toast notification — replaces native alert() so messages match the
// app's own dark theme instead of a jarring browser-native popup.
let toastHideTimer = null;
function showToast(message, { error = false, duration = 2600 } = {}) {
  const el = document.getElementById('toast');
  el.textContent = message;
  el.classList.toggle('toast-error', error);
  el.classList.add('show');
  clearTimeout(toastHideTimer);
  toastHideTimer = setTimeout(() => el.classList.remove('show'), duration);
}

// Background music — muted state remembered across sessions. Browsers block
// audio autoplay until the user actually interacts with the page, so actual
// playback is kicked off lazily on the first click anywhere.
const MUSIC_MUTED_KEY = "gw_music_muted";
let musicStarted = false;
// Two separate toggle buttons — one on the start screen, one inside the
// in-game Menu dropdown — since each is a child of a screen that's already
// shown/hidden by the rest of the app, neither needs its own visibility
// logic (and the old single floating button was the thing that used to
// overlap the HUD during gameplay).
function updateMusicButton() {
  const music = document.getElementById('bg-music');
  document.getElementById('start-music-toggle').textContent = music.muted ? '🔇 Music' : '🔊 Music';
  document.getElementById('menu-music-toggle').textContent = music.muted ? '🔇 Music: Off' : '🔊 Music: On';
}
function toggleMusic() {
  const music = document.getElementById('bg-music');
  music.muted = !music.muted;
  localStorage.setItem(MUSIC_MUTED_KEY, music.muted ? '1' : '0');
  updateMusicButton();
  if (!music.muted && !musicStarted) startMusicPlayback();
}
function initMusic() {
  const music = document.getElementById('bg-music');

// --- Accounts + score saving ---
const AUTH_TOKEN_KEY = "gw_auth_token";
const AUTH_USERNAME_KEY = "gw_auth_username";
let authToken = null;
let authUsername = null;
let authMode = "signup"; // or "login"
let pendingScoreToSave = null; // set when the auth modal was opened specifically to save a score

async function apiRequest(path, { method = "GET", body, auth = false } = {}) {
  const headers = {};
  if (body !== undefined) headers["Content-Type"] = "application/json";
  if (auth && authToken) headers["Authorization"] = "Bearer " + authToken;
  const res = await fetch(path, { method, headers, body: body !== undefined ? JSON.stringify(body) : undefined });
  let data = null;
  try { data = await res.json(); } catch {}
  if (!res.ok) throw new Error((data && data.error) || "Request failed");
  return data;
}

function updateAuthUI() {
  const loggedIn = !!authToken;
  document.getElementById("account-btn").textContent = loggedIn ? `👤 ${authUsername} (Log out)` : "👤 Sign in / Sign up";
  document.getElementById("menu-account-btn").textContent = loggedIn ? `👤 ${authUsername} (Log out)` : "👤 Sign in / Sign up";
  // The result-screen button text/behavior adapts: once logged in it directly
  // saves your score instead of prompting to sign up first.
  document.getElementById("signup-btn").textContent = loggedIn ? "💾 Save score" : "👤 Sign up to save your score!";
}
function setAuthSession(token, username) {
  authToken = token; authUsername = username;
  localStorage.setItem(AUTH_TOKEN_KEY, token);
  localStorage.setItem(AUTH_USERNAME_KEY, username);
  updateAuthUI();
}
function clearAuthSession() {
  authToken = null; authUsername = null;
  localStorage.removeItem(AUTH_TOKEN_KEY);
  localStorage.removeItem(AUTH_USERNAME_KEY);
  updateAuthUI();
}
async function restoreAuthSession() {
  const token = localStorage.getItem(AUTH_TOKEN_KEY);
  if (!token) return;
  authToken = token;
  authUsername = localStorage.getItem(AUTH_USERNAME_KEY);
  try {
    const me = await apiRequest("/api/me", { auth: true });
    authUsername = me.username;
  } catch {
    clearAuthSession();
    return;
  }
  updateAuthUI();
}
function logOut() {
  apiRequest("/api/logout", { method: "POST", auth: true }).catch(() => {});
  clearAuthSession();
  showToast("Logged out");
}

function openAuthModal() {
  authMode = "signup";
  applyAuthMode();
  document.getElementById("auth-username").value = "";
  document.getElementById("auth-password").value = "";
  document.getElementById("auth-modal").classList.add("open");
  document.getElementById("auth-username").focus();
}
function closeAuthModal() {
  document.getElementById("auth-modal").classList.remove("open");
}
function applyAuthMode() {
  const isSignup = authMode === "signup";
  document.getElementById("auth-title").textContent = isSignup ? "Sign Up" : "Log In";
  document.getElementById("auth-submit-btn").textContent = isSignup ? "Sign Up" : "Log In";
  document.getElementById("auth-switch-btn").textContent = isSignup ? "Already have an account? Log in" : "Don't have an account? Sign up";
}
async function submitAuthForm() {
  const username = document.getElementById("auth-username").value.trim();
  const password = document.getElementById("auth-password").value;
  if (!username || !password) { showToast("Enter a username and password"); return; }
  try {
    const data = await apiRequest(authMode === "signup" ? "/api/signup" : "/api/login", { method: "POST", body: { username, password } });
    setAuthSession(data.token, data.username);
    closeAuthModal();
    showToast(`Welcome, ${data.username}!`);
    if (pendingScoreToSave != null) {
      await saveScore(pendingScoreToSave);
      pendingScoreToSave = null;
    }
  } catch (err) {
    showToast(err.message, { error: true });
  }
}
async function saveScore(score) {
  try {
    await apiRequest("/api/score", { method: "POST", auth: true, body: { score } });
    showToast("Score saved!");
  } catch (err) {
    showToast("Could not save score: " + err.message, { error: true });
  }
}
// The current player's own final score — used when the "save score" button
// is clicked on an actual game-over screen (solo or multiplayer).
function finalScoreForSaving() {
  if (isMultiplayer) {
    const me = latestPlayers.find((p) => p.id === myId);
    return me ? me.score : 0;
  }
  return totalScore;
}
function handleSaveScoreClick() {
  const score = finalScoreForSaving();
  if (authToken) {
    saveScore(score);
  } else {
    pendingScoreToSave = score;
    openAuthModal();
  }
}

// --- Round timer ---
let timerInterval = null;
let timerEndAt = 0;

function startTimer(ms) {
  stopTimer();
  timerEndAt = Date.now() + (ms || 0);
  const el = document.getElementById("timer");
  el.style.display = "inline-flex";
  const tick = () => {
    const remain = Math.max(0, timerEndAt - Date.now());
    const secs = Math.ceil(remain / 1000);
    el.textContent = secs;
    el.classList.toggle("timer-warn", secs <= 15 && secs > 5);
    el.classList.toggle("timer-danger", secs <= 5);
    if (remain <= 0) {
      clearInterval(timerInterval);
      timerInterval = null;
      onTimerExpired();
    }
  };
  tick();
  timerInterval = setInterval(tick, 250);
}
function stopTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = null;
  const el = document.getElementById("timer");
  el.style.display = "none";
  el.classList.remove("timer-warn", "timer-danger");
}
function onTimerExpired() {
  if (!isMultiplayer) {
    submitGuess(true);
  } else {
    document.getElementById("guess-btn").disabled = true;
  }
}
