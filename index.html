function lonLatToTile(lon, lat, z) {
  const n = Math.pow(2, z);
  const x = Math.floor((lon + 180) / 360 * n);
  const latRad = lat * Math.PI / 180;
  const y = Math.floor((1 - Math.log(Math.tan(latRad) + 1 / Math.cos(latRad)) / Math.PI) / 2 * n);
  return { x, y, z };
}

// --- Precise (BigInt-safe) vector tile parsing ---
// Mapillary image IDs are 64-bit and JS numbers can't hold them exactly,
// so we hand-parse just the "id" property as a BigInt instead of trusting
// a standard decoder's lossy Number conversion.

function readVarintNumber(buf, pos) {
  let result = 0, shift = 0, b;
  do { b = buf[pos.i++]; result += (b & 0x7f) * Math.pow(2, shift); shift += 7; } while (b >= 0x80);
  return result;
}
function readVarintBigInt(buf, pos) {
  let result = 0n, shift = 0n, b;
  do { b = buf[pos.i++]; result |= BigInt(b & 0x7f) << shift; shift += 7n; } while (b >= 0x80);
  return result;
}
function readTag(buf, pos) {
  const v = readVarintNumber(buf, pos);
  return { field: v >>> 3, wireType: v & 0x7 };
}
function skipField(buf, pos, wireType) {
  if (wireType === 0) { while (buf[pos.i++] >= 0x80) {} }
  else if (wireType === 2) { const len = readVarintNumber(buf, pos); pos.i += len; }
  else if (wireType === 1) pos.i += 8;
  else if (wireType === 5) pos.i += 4;
}
function parseValue(buf, start, end) {
  const pos = { i: start };
  let out = null, isBool = null;
  while (pos.i < end) {
    const { field, wireType } = readTag(buf, pos);
    if ((field === 4 || field === 5 || field === 6) && wireType === 0) {
      out = readVarintBigInt(buf, pos).toString();
    } else if (field === 7 && wireType === 0) {
      isBool = readVarintNumber(buf, pos) !== 0;
    } else {
      skipField(buf, pos, wireType);
    }
  }
  return { str: out, bool: isBool };
}
function parseLayer(buf, start, end) {
  const pos = { i: start };
  let name = null;
  const keys = [], values = [], features = [];
  while (pos.i < end) {
    const { field, wireType } = readTag(buf, pos);
    if (field === 1 && wireType === 2) {
      const len = readVarintNumber(buf, pos);
      name = new TextDecoder().decode(buf.subarray(pos.i, pos.i + len));
      pos.i += len;
    } else if (field === 2 && wireType === 2) {
      const len = readVarintNumber(buf, pos);
      features.push({ start: pos.i, end: pos.i + len });
      pos.i += len;
    } else if (field === 3 && wireType === 2) {
      const len = readVarintNumber(buf, pos);
      keys.push(new TextDecoder().decode(buf.subarray(pos.i, pos.i + len)));
      pos.i += len;
    } else if (field === 4 && wireType === 2) {
      const len = readVarintNumber(buf, pos);
      values.push(parseValue(buf, pos.i, pos.i + len));
      pos.i += len;
    } else {
      skipField(buf, pos, wireType);
    }
  }
  return { name, keys, values, features };
}
function parseFeatureTags(buf, start, end) {
  const pos = { i: start };
  const tags = [];
  while (pos.i < end) {
    const { field, wireType } = readTag(buf, pos);
    if (field === 2 && wireType === 2) {
      const len = readVarintNumber(buf, pos);
      const endT = pos.i + len;
      while (pos.i < endT) tags.push(readVarintNumber(buf, pos));
      pos.i = endT;
    } else {
      skipField(buf, pos, wireType);
    }
  }
  return tags;
}
function parseTileLayers(buf) {
  const pos = { i: 0 };
  const layers = [];
  while (pos.i < buf.length) {
    const { field, wireType } = readTag(buf, pos);
    if (field === 3 && wireType === 2) {
      const len = readVarintNumber(buf, pos);
      layers.push(parseLayer(buf, pos.i, pos.i + len));
      pos.i += len;
    } else {
      skipField(buf, pos, wireType);
    }
  }
  return layers;
}
function extractPreciseImageData(buf) {
  const layers = parseTileLayers(buf);
  const layer = layers.find(l => l.name === 'image');
  if (!layer) return [];
  const idKeyIdx = layer.keys.indexOf('id');
  const panoKeyIdx = layer.keys.indexOf('is_pano');
  if (idKeyIdx === -1) return [];
  const out = [];
  for (const feat of layer.features) {
    const tags = parseFeatureTags(buf, feat.start, feat.end);
    let id = null, isPano = false;
    for (let i = 0; i < tags.length; i += 2) {
      const key = tags[i], valIdx = tags[i + 1];
      if (key === idKeyIdx && layer.values[valIdx]) id = layer.values[valIdx].str;
      if (key === panoKeyIdx && layer.values[valIdx]) isPano = layer.values[valIdx].bool === true;
    }
    if (id) out.push({ id, isPano });
  }
  return out;
}

// Kicked off once at page load (during the start screen, not on the critical
// path of a round) so by the time a round actually needs these, they're
// already resolved from the module cache instead of costing a CDN round trip.
const vectorTileModules = Promise.all([
  import('https://esm.sh/pbf@3.2.1'),
  import('https://esm.sh/@mapbox/vector-tile@1.3.1'),
]).then(([pbfMod, vtMod]) => ({ Protobuf: pbfMod.default, VectorTile: vtMod.VectorTile }));

// Find a real, precise (BigInt-safe) starting image id near a spot.
// We use the standard vector-tile decoder for lon/lat (safe, no big integers
// involved there) and our own manual parser for the id (must stay exact).
async function findStartImageId(spot) {
  const t = lonLatToTile(spot.lon, spot.lat, 14);
  const url = `https://tiles.mapillary.com/maps/vtp/mly1_public/2/${t.z}/${t.x}/${t.y}?access_token=${TOKEN}`;
  const [res, { Protobuf, VectorTile }] = await Promise.all([fetch(url), vectorTileModules]);
  if (!res.ok) return null;
  const buf = new Uint8Array(await res.arrayBuffer());

  const imageData = extractPreciseImageData(buf);
  if (imageData.length === 0) return null;

  const tile = new VectorTile(new Protobuf(buf));
  const layer = tile.layers['image'];
  if (!layer || layer.length === 0) return null;

  // Both parses walk the layer's features in the same order, so index i in
  // imageData corresponds to layer.feature(i).
  const panoIndices = imageData.map((d, i) => d.isPano ? i : -1).filter(i => i !== -1);
  const pool = panoIndices.length > 0 ? panoIndices : imageData.map((_, i) => i);

  const idx = pool[Math.floor(Math.random() * pool.length)];
  const feature = layer.feature(idx);
  const gj = feature.toGeoJSON(t.x, t.y, t.z);
  return {
    id: imageData[idx].id,
    lat: gj.geometry.coordinates[1],
    lon: gj.geometry.coordinates[0],
    isPano: imageData[idx].isPano,
  };
}

// Shared Mapillary viewer setup used by solo, multiplayer, and resume/rejoin flows.
function mountViewer(imageId, { onImage } = {}) {
  currentImageId = imageId;
  if (mlyViewer) { mlyViewer.remove(); mlyViewer = null; }
  mlyViewer = new mapillary.Viewer({
    accessToken: TOKEN,
    container: 'mly',
    imageId: imageId,
    // Disable every bit of Mapillary's own UI chrome, including `direction`
    // (its on-image navigation arrows, which faded in/out unreliably as edge
    // data loaded) — the always-on nav-* slots below replace it. Edge data
    // and bearing itself (sequenceedges/spatialedges/bearing events) are
    // unaffected by this and still drive moveDir(), since that's core
    // Navigator behavior, not tied to whether the visual component is
    // enabled. Keep `attribution` since Mapillary requires it.
    component: { cover: false, bearing: false, zoom: false, sequence: false, direction: false },
  });
  mlyViewer.on('image', (event) => {
    if (event.image && event.image.lngLat) {
      currentCoords = { lat: event.image.lngLat.lat, lon: event.image.lngLat.lng };
    }
    resetNavAvailability();
    if (onImage) onImage();
  });
  mlyViewer.on('sequenceedges', (event) => setNavSequenceEdges(event.status));
  mlyViewer.on('spatialedges', (event) => setNavSpatialEdges(event.status));
  mlyViewer.on('bearing', (event) => { navBearingDeg = event.bearing; updateNavSlots(); });
}

// --- Custom on-image navigation (replaces Mapillary's flaky direction arrows) ---
// Two tiers:
// 1. The four .nav-slot images are plain, always-visible, non-interactive —
//    they just show which directions currently exist, clustered at bottom-
//    center. Which real edge occupies each zone (up/down/left/right) is
//    recomputed from that edge's real-world bearing (worldMotionAzimuth)
//    relative to your current view bearing, so — unlike a fixed "up =
//    forward" mapping — it stays correct as you drag to look around, the
//    same way Mapillary's own arrows track edges, just without Mapillary's
//    own flaky rendering.
// 2. #nav-hover is the actual interactive control: it follows the cursor
//    while hovering the photo, appears only over a zone that currently has
//    a direction, and clicking (not dragging) moves you there.

// Sequence and spatial edges are reported by separate events, each of which
// can refire more than once as caching completes — tracked separately and
// replaced (not appended) so a repeat firing can't pile up stale duplicates.
let navSequenceEdges = [];
let navSpatialEdges = [];
let navBearingDeg = 0; // current view bearing, degrees clockwise from north
let navLastPoint = null; // last known {x,y} client coords while hovering, or null
let navPointerDownAt = null;
let roundActive = true; // false once results are showing — blocks both nav movement and placing/moving the guess pin

async function tryMoveNavSlot(slot) {
  if (!roundActive || !mlyViewer) return;
  // Don't trust the cached navBearingDeg here — it only updates when the
  // 'bearing' event fires, which can lag behind an active drag. Fetch the
  // viewer's actual live bearing right now and recompute which edge belongs
  // in this slot at THIS exact moment, so the move always matches whatever
  // you were just looking at when you clicked, not a stale snapshot.
  let bearingDeg = navBearingDeg;
  try { bearingDeg = await mlyViewer.getBearing(); } catch {}
  const edge = bestEdgeForSlot(slot, bearingDeg);
  if (!edge) return;
  // Navigate to the edge's SPECIFIC target image, not moveDir(direction).
  // moveDir re-selects an edge by direction enum inside Mapillary, and on
  // panoramas several edges share the same enum (e.g. the road ahead AND
  // behind are both Spherical) — so moveDir could follow a different edge
  // than the one we resolved as being in the clicked direction, sending you
  // the wrong way. moveTo(targetImageId) is unambiguous.
  if (edge.target) mlyViewer.moveTo(edge.target).catch(() => {});
  else mlyViewer.moveDir(edge.data.direction).catch(() => {});
}

function resetNavAvailability() {
  navSequenceEdges = [];
  navSpatialEdges = [];
  updateNavSlots();
}
function setNavSequenceEdges(status) {
  if (!status.cached) return;
  navSequenceEdges = status.edges;
  updateNavSlots();
}
function setNavSpatialEdges(status) {
  if (!status.cached) return;
  navSpatialEdges = status.edges;
  updateNavSlots();
}

// Prefer actual spatial steps/turns over sequence Next/Prev (which carry no
// real bearing) or the more exotic spherical/similar edge types.
function navPriority(direction) {
  const D = mapillary.NavigationDirection;
  const order = [D.StepForward, D.StepBackward, D.StepLeft, D.StepRight, D.TurnLeft, D.TurnRight, D.Next, D.Prev, D.Spherical, D.Similar];
  const idx = order.indexOf(direction);
  return idx === -1 ? order.length : idx;
}
// Same conversion Mapillary's own internal Spatial utility uses to turn a raw
// azimuthal angle (radians) into a compass bearing (degrees clockwise from north).
function azimuthToBearingDeg(azimuthRad) {
  const deg = (-azimuthRad + Math.PI / 2) * 180 / Math.PI;
  return ((deg % 360) + 360) % 360;
}
// Relative angle of an edge vs. your current view: 0 = straight ahead,
// +90 = directly to your right, -90 = directly to your left, +-180 = behind.
function navRelativeAngleForEdge(edge, bearingDeg) {
  const D = mapillary.NavigationDirection;
  if (Number.isNaN(edge.data.worldMotionAzimuth)) {
    // Sequence Next/Prev carry no real bearing — approximate them as
    // straight ahead/behind wherever you're currently facing.
    return edge.data.direction === D.Prev ? 180 : 0;
  }
  const edgeBearing = azimuthToBearingDeg(edge.data.worldMotionAzimuth);
  return ((edgeBearing - bearingDeg + 180) % 360 + 360) % 360 - 180; // (-180, 180]
}
// Which edge WOULD occupy this slot at a given bearing — used both for the
// (possibly slightly-stale, event-driven) display, and, critically,
// recomputed fresh against the viewer's live bearing right when a click
// actually executes a move, so a move can never use an out-of-date rotation
// snapshot from a lagging 'bearing' event.
function bestEdgeForSlot(slot, bearingDeg) {
  let best = null;
  for (const edge of [...navSequenceEdges, ...navSpatialEdges]) {
    if (navSlotForAngle(navRelativeAngleForEdge(edge, bearingDeg)) !== slot) continue;
    if (!best || navPriority(edge.data.direction) < navPriority(best.data.direction)) best = edge;
  }
  return best;
}
function navSlotForAngle(relative) {
  const abs = Math.abs(relative);
  if (abs <= 45) return 'up';
  if (abs >= 135) return 'down';
  return relative > 0 ? 'right' : 'left';
}
// Smallest signed difference between two angles, both in (-180, 180].
function navAngleDiff(a, b) {
  return Math.abs(((a - b + 180) % 360 + 360) % 360 - 180);
}
// Icon rotation for a given relative angle — arrow.png points down at 0deg,
// and 0deg-relative (straight ahead) needs to point up (180deg), rotating
// clockwise as relative increases (matching a click/turn to the right).
function navRotationForAngle(relative) {
  return ((180 + relative) % 360 + 360) % 360;
}
function updateNavSlots() {
  const best = { up: null, down: null, left: null, right: null };
  const bestAngle = { up: null, down: null, left: null, right: null };
  for (const edge of [...navSequenceEdges, ...navSpatialEdges]) {
    const relative = navRelativeAngleForEdge(edge, navBearingDeg);
    const slot = navSlotForAngle(relative);
    if (!best[slot] || navPriority(edge.data.direction) < navPriority(best[slot].data.direction)) {
      best[slot] = edge;
      bestAngle[slot] = relative;
    }
  }
  for (const slot of ['up', 'down', 'left', 'right']) {
    const el = document.getElementById('nav-' + slot);
    if (best[slot]) {
      el.style.display = 'block';
      el.dataset.direction = String(best[slot].data.direction);
      el.dataset.angle = String(bestAngle[slot]);
      // Rotate to the edge's actual bearing, not just a fixed per-slot
      // rotation — a "forward" path that's slightly off-center should visibly
      // lean that way instead of always pointing dead straight up.
      el.style.transform = `translateX(-50%) rotate(${navRotationForAngle(bestAngle[slot])}deg)`;
    } else {
      el.style.display = 'none';
      delete el.dataset.direction;
      delete el.dataset.angle;
    }
  }
  refreshNavHover(); // if already hovering, reflect any change immediately
}

// Angle of a click/hover point relative to the photo's center, in the same
// 0=ahead/+90=right/-90=left/+-180=behind convention as edge angles — this
// (not a crude up/down/left/right quadrant split) is what lets "closer to
// the bottom of the screen than the top, but clearly on the road ahead"
// still correctly resolve to forward: whichever available direction's real
// angle is numerically closest to where you clicked wins, however close it
// actually sits to the exact center of the frame.
function navPointAngle(rect, clientX, clientY) {
  const dx = clientX - (rect.left + rect.width / 2);
  const dy = clientY - (rect.top + rect.height / 2);
  return Math.atan2(dx, -dy) * 180 / Math.PI;
}
function navClosestSlotFor(clientX, clientY) {
  const panel = document.getElementById('photo-panel');
  const rect = panel.getBoundingClientRect();
  const pointAngle = navPointAngle(rect, clientX, clientY);
  let bestSlot = null, bestDiff = Infinity;
  for (const slot of ['up', 'down', 'left', 'right']) {
    const el = document.getElementById('nav-' + slot);
    if (el.dataset.angle === undefined) continue;
    const diff = navAngleDiff(pointAngle, Number(el.dataset.angle));
    if (diff < bestDiff) { bestDiff = diff; bestSlot = slot; }
  }
  return bestSlot;
}
function hideNavHover() {
  document.getElementById('nav-hover').style.display = 'none';
  document.getElementById('photo-panel').style.cursor = '';
}
// The panel-wide quadrant test is based on distance from the WHOLE photo's
// center — but the .nav-slot cluster sits low, near the bottom edge, so a
// click physically ON one of those arrows still geometrically falls in the
// "down" quadrant of the full panel. Without this check, every arrow click
// fired a second, usually-wrong moveDir alongside the correct direct one
// (that's the "clicking one arrow breaks the others" bug) — so any
// interaction that targets the cluster (or the hover badge) is left
// entirely to their own dedicated handlers instead.
function isNavClusterTarget(target) {
  return !!(target && target.closest && target.closest('.nav-slot, #nav-hover'));
}
// A padded bounding box around whichever arrows are currently visible, so
// "near" means the general cluster area rather than requiring the cursor to
// land on one specific 28px icon.
function nearNavCluster(clientX, clientY) {
  const pad = 24;
  let minLeft = Infinity, minTop = Infinity, maxRight = -Infinity, maxBottom = -Infinity, any = false;
  for (const slot of ['up', 'down', 'left', 'right']) {
    const el = document.getElementById('nav-' + slot);
    if (el.style.display === 'none') continue;
    const r = el.getBoundingClientRect();
    minLeft = Math.min(minLeft, r.left); minTop = Math.min(minTop, r.top);
    maxRight = Math.max(maxRight, r.right); maxBottom = Math.max(maxBottom, r.bottom);
    any = true;
  }
  if (!any) return false;
  return clientX >= minLeft - pad && clientX <= maxRight + pad && clientY >= minTop - pad && clientY <= maxBottom + pad;
}
function handleNavHoverAt(clientX, clientY) {
  if (!roundActive) { hideNavHover(); return; }
  // Don't show the hover badge near the always-visible arrows — they're
  // already directly clickable, so a second control right on top is just clutter.
  if (nearNavCluster(clientX, clientY)) { hideNavHover(); return; }
  const panel = document.getElementById('photo-panel');
  const rect = panel.getBoundingClientRect();
  const zone = navClosestSlotFor(clientX, clientY);
  if (!zone) { hideNavHover(); return; }
  const slotEl = document.getElementById('nav-' + zone);
  panel.style.cursor = 'pointer';
  const hover = document.getElementById('nav-hover');
  hover.style.display = 'flex';
  hover.style.left = (clientX - rect.left) + 'px';
  hover.style.top = (clientY - rect.top) + 'px';
  hover.style.transform = 'translate(-50%, -50%)';
  hover.querySelector('img').style.transform = `rotate(${navRotationForAngle(Number(slotEl.dataset.angle))}deg)`;
}
function refreshNavHover() {
  if (navLastPoint) handleNavHoverAt(navLastPoint.x, navLastPoint.y);
  else hideNavHover();
}

(function initNavHoverListeners() {
  const panel = document.getElementById('photo-panel');
  panel.addEventListener('pointermove', (e) => {
    navLastPoint = { x: e.clientX, y: e.clientY };
    handleNavHoverAt(e.clientX, e.clientY);
  });
  panel.addEventListener('pointerleave', () => {
    navLastPoint = null;
    hideNavHover();
  });
  panel.addEventListener('pointerdown', (e) => {
    if (isNavClusterTarget(e.target)) { navPointerDownAt = null; return; }
    navPointerDownAt = { x: e.clientX, y: e.clientY };
  });
  panel.addEventListener('pointerup', (e) => {
    const start = navPointerDownAt;
    navPointerDownAt = null;
    if (!start || isNavClusterTarget(e.target)) return;
    // Ignore drags (looking around) — only a near-stationary press counts as
    // a click-to-move, same distinction Mapillary's own pointer component
    // effectively makes between rotating the view and clicking a control.
    if (Math.hypot(e.clientX - start.x, e.clientY - start.y) > 6) return;
    const zone = navClosestSlotFor(e.clientX, e.clientY);
    if (zone) tryMoveNavSlot(zone);
  });
  // The plain always-visible arrows are directly clickable too, not just
  // reachable by hovering anywhere in their quadrant of the photo.
  for (const slot of ['up', 'down', 'left', 'right']) {
    document.getElementById('nav-' + slot).addEventListener('click', (e) => {
      e.stopPropagation();
      tryMoveNavSlot(slot);
    });
  }
})();

async function loadRound(tried = []) {
  const status = document.getElementById("loading");
  status.style.display = "flex";
  status.textContent = "Loading street view...";
  document.getElementById("round").textContent = round;
  document.getElementById("guess-btn").disabled = false;

  const remaining = SPOTS.filter(s => !tried.includes(s.name));
  if (remaining.length === 0) {
    status.textContent = "Couldn't find coverage right now. Try again.";
    return;
  }

  // Try a few candidate spots concurrently instead of one at a time — a
  // single spot's tile sometimes has no image coverage, and retrying those
  // sequentially was the main source of slow round loads.
  const batch = [...remaining].sort(() => Math.random() - 0.5).slice(0, 3);

  try {
    const results = await Promise.all(batch.map(spot => findStartImageId(spot).catch(() => null)));
    const start = results.find(r => r);
    if (!start) return loadRound([...tried, ...batch.map(s => s.name)]);

    currentCoords = { lat: start.lat, lon: start.lon };

    // If the viewer never fires its image event (Mapillary busy/rate-limited),
    // don't hang on "Loading..." forever — surface a retry after a timeout.
    let loaded = false;
    const loadTimeout = setTimeout(() => {
      if (loaded) return;
      status.innerHTML = "Street view is taking too long to load — Mapillary may be busy.<br><br>" +
        "<button class='btn' id='retry-btn'>Try again</button>";
      const rb = document.getElementById("retry-btn");
      if (rb) rb.onclick = () => loadRound();
    }, 15000);

    mountViewer(start.id, {
      onImage: () => {
        if (loaded) return;
        loaded = true;
        clearTimeout(loadTimeout);
        status.style.display = "none";
        // Start the guess clock only once the image is actually visible, not
        // while it's still loading (otherwise slow loads eat into your time).
        // Practice mode skips this entirely — no pressure, take your time.
        if (!practiceMode) startTimer(SOLO_TIMEOUT_MS);
        saveSoloSession();
      }
    });
    saveSoloSession();
  } catch (err) {
    status.textContent = "Error: " + err.message;
  }
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// The actual GeoGuessr scoring formula: Score = 5000 * e^(-10*d / 14916862),
// where d is the error distance in meters.
function scoreFromDistance(km) {
  const meters = km * 1000;
  return Math.round(5000 * Math.exp(-10 * meters / 14916862));
}

// GeoGuessr-style snarky commentary based on how far off the guess was.
const DISTANCE_COMMENTS = [
  { max: 1, text: "Spot on! Are you from around here?" },
  { max: 10, text: "Incredible! Practically exact." },
  { max: 50, text: "Really impressive guess!" },
  { max: 200, text: "Pretty close!" },
  { max: 750, text: "Not bad — same general area." },
  { max: 2000, text: "Distance is relative, right?" },
  { max: 6000, text: "Well, at least you got the right continent. Probably." },
  { max: 12000, text: "At least it was on the same planet." },
  { max: Infinity, text: "Almost there! (Just on the completely wrong side of the Earth.)" },
];
function distanceComment(km) {
  for (const c of DISTANCE_COMMENTS) if (km <= c.max) return c.text;
  return DISTANCE_COMMENTS[DISTANCE_COMMENTS.length - 1].text;
}

function connectWS(onOpen) {
  if (!WS_URL || WS_URL.includes("PASTE_YOUR")) {
    showToast("Set WS_URL near the top of the script to your deployed Railway domain first.", { error: true, duration: 5000 });
    return;
  }
  ws = new WebSocket(WS_URL);
  ws.onopen = () => onOpen && onOpen();
  ws.onmessage = (event) => handleWSMessage(JSON.parse(event.data));
  ws.onclose = () => { document.getElementById("lobby-status").textContent = "Disconnected from server."; };
  ws.onerror = () => { document.getElementById("lobby-status").textContent = "Connection error — check WS_URL and that the server is running."; };
}

function handleWSMessage(msg) {
  if (msg.type === "room_created") {
    myId = msg.id; hostId = msg.hostId; myToken = msg.token; currentRoomCode = msg.code;
    saveMPSession();
    document.getElementById("lobby-create").style.display = "none";
    document.getElementById("lobby-join").previousElementSibling.style.display = "none";
    document.getElementById("lobby-join").style.display = "none";
    document.getElementById("lobby-waiting").style.display = "flex";
    document.getElementById("lobby-code").textContent = msg.code;
    const link = `${location.origin}${location.pathname}?room=${msg.code}`;
    document.getElementById("lobby-link").textContent = link;
    document.getElementById("copy-link-btn").style.display = "inline-block";
    document.getElementById("host-start-btn").style.display = "inline-block";
    document.getElementById("lobby-status").textContent = "Share the code or link. Start whenever you're ready.";
  }

  else if (msg.type === "room_joined") {
    myId = msg.id; hostId = msg.hostId; myToken = msg.token; currentRoomCode = msg.code;
    saveMPSession();
    document.getElementById("lobby-create").style.display = "none";
    document.getElementById("lobby-join").previousElementSibling.style.display = "none";
    document.getElementById("lobby-join").style.display = "none";
    document.getElementById("lobby-waiting").style.display = "flex";
    document.getElementById("lobby-code").textContent = msg.code;
    document.getElementById("lobby-link").textContent = "";
    document.getElementById("copy-link-btn").style.display = "none";
    document.getElementById("lobby-status").textContent = "Waiting for host to start...";
  }

  else if (msg.type === "rejoined") {
    isMultiplayer = true;
    myId = msg.id; hostId = msg.hostId; currentRoomCode = msg.code;
    round = msg.round || 1;
    latestPlayers = msg.players;
    const me = latestPlayers.find(p => p.id === myId);
    totalScore = me ? me.score : 0;
    document.getElementById("score").textContent = totalScore;
    document.getElementById("round").textContent = Math.max(round, 1);
    renderInGamePlayers();

    if (msg.phase === "lobby") {
      document.getElementById("game").style.display = "none";
      document.getElementById("player-list").style.display = "none";
      document.getElementById("start-screen").style.display = "flex";
      showLobby();
      document.getElementById("lobby-create").style.display = "none";
      document.getElementById("lobby-join").previousElementSibling.style.display = "none";
      document.getElementById("lobby-join").style.display = "none";
      document.getElementById("lobby-waiting").style.display = "flex";
      document.getElementById("lobby-code").textContent = msg.code;
      document.getElementById("host-start-btn").style.display = myId === hostId ? "inline-block" : "none";
      document.getElementById("lobby-status").textContent = "Waiting for host to start...";
    } else {
      document.getElementById("start-screen").style.display = "none";
      document.getElementById("game").style.display = "block";
      document.getElementById("player-list").style.display = "block";
      if (!map) initMap();

      if (msg.phase === "round") {
        document.getElementById("loading").style.display = "flex";
        document.getElementById("loading").textContent = "Loading street view...";
        loadImageIntoViewer(msg.imageId, msg.alreadyGuessed);
        startTimer(msg.timeLeft || 0);
      } else {
        document.getElementById("loading").style.display = "none";
        document.getElementById("result").style.display = "flex";
        document.getElementById("result-title").textContent = "Between rounds";
        document.getElementById("result-detail").textContent = "Waiting for the host to continue...";
        document.getElementById("result-comment").textContent = "";
        document.getElementById("results-table").style.display = "none";
        document.getElementById("signup-btn").style.display = "none";
        enterResultMapView();
        const btn = document.getElementById("next-btn");
        if (myId === hostId) {
          btn.style.display = "inline-block";
          btn.textContent = "Continue";
          btn.onclick = () => { ws.send(JSON.stringify({ type: "start_round" })); document.getElementById("result").style.display = "none"; exitResultMapView(); };
        } else {
          btn.style.display = "none";
        }
      }
    }
  }

  else if (msg.type === "rejoin_failed") {
    clearMPSession();
    document.getElementById("game").style.display = "none";
    document.getElementById("player-list").style.display = "none";
    document.getElementById("start-screen").style.display = "flex";
  }

  else if (msg.type === "players") {
    latestPlayers = msg.players;
    hostId = msg.hostId;
    renderLobbyPlayers();
    renderInGamePlayers();
    if (myId === hostId) document.getElementById("host-start-btn").style.display = "inline-block";
  }

  else if (msg.type === "round_loading") {
    if (document.getElementById("game").style.display !== "block") {
      document.getElementById("start-screen").style.display = "none";
      document.getElementById("game").style.display = "block";
      document.getElementById("player-list").style.display = "block";
      if (!map) initMap();
    }
    stopTimer();
    document.getElementById("guess-btn").disabled = false;
    document.getElementById("loading").style.display = "flex";
    document.getElementById("loading").textContent = "Loading next location...";
    document.getElementById("round").textContent = msg.round;
    hasGuessedThisRound = false;
    // The result screen from the round that just ended was never actually
    // dismissed for anyone (only a special-case button handled it) — make
    // sure every client (host and joiners) drops it once the next round loads.
    document.getElementById("result").style.display = "none";
    exitResultMapView();
    resetMapMarkers();
  }

  else if (msg.type === "round_start") {
    document.getElementById("round").textContent = msg.round;
    loadImageIntoViewer(msg.imageId);
    startTimer(msg.timeLeft || 60000);
  }

  else if (msg.type === "round_result") {
    stopTimer();
    showMultiplayerResult(msg);
  }

  else if (msg.type === "game_over") {
    stopTimer();
    clearMPSession();
    showMultiplayerGameOver(msg);
  }

  else if (msg.type === "error") {
    showToast(msg.message, { error: true });
  }
}

function renderLobbyPlayers() {
  const el = document.getElementById("lobby-players");
  if (!el) return;
  el.innerHTML = latestPlayers.map(p => `${p.name}${p.id === hostId ? " (host)" : ""}`).join("<br>");
}

function renderInGamePlayers() {
  const el = document.getElementById("player-list");
  if (!isMultiplayer) return;
  el.innerHTML = latestPlayers
    .map(p => `<div class="player-row${p.id === hostId ? ' host' : ''}"><span>${p.name}</span><span class="${p.guessed ? 'guessed' : ''}">${p.guessed ? 'guessed' : p.score}</span></div>`)
    .join("");
}

function loadImageIntoViewer(imageId, alreadyGuessed) {
  const status = document.getElementById("loading");
  hasGuessedThisRound = !!alreadyGuessed;
  document.getElementById("guess-btn").disabled = hasGuessedThisRound;
  if (hasGuessedThisRound) {
    status.style.display = "flex";
    status.textContent = "Guess submitted — waiting for other players...";
  }
  mountViewer(imageId, {
    onImage: () => {
      if (!hasGuessedThisRound) status.style.display = "none";
    }
  });
}

function resetMapMarkers() {
  if (!map) return;
  if (guessMarker) { map.removeLayer(guessMarker); guessMarker = null; }
  if (actualMarker) { map.removeLayer(actualMarker); actualMarker = null; }
  if (connectLine) { map.removeLayer(connectLine); connectLine = null; }
  map.setView([20, 0], 2);
}

// The mini-map expands to fill most of the screen while results are shown,
// so you can actually see your guess vs. the real location instead of it
// being hidden behind a full-screen results overlay.
function enterResultMapView() {
  document.getElementById('map-wrap').classList.add('result-view');
  if (map) map.invalidateSize();
  // The round is already decided once results are showing — walking around
  // or looking around further would be harmless (you can't guess again) but
  // still shouldn't be possible, so disable and hide the nav arrows, and
  // block all interaction with the photo (including Mapillary's own
  // drag-to-look-around) until the next round.
  roundActive = false;
  hideNavHover();
  for (const slot of ['up', 'down', 'left', 'right']) {
    document.getElementById('nav-' + slot).style.display = 'none';
  }
  document.getElementById('photo-panel').style.pointerEvents = 'none';
}
function exitResultMapView() {
  document.getElementById('map-wrap').classList.remove('result-view');
  if (map) map.invalidateSize();
  roundActive = true;
  document.getElementById('photo-panel').style.pointerEvents = '';
}

function showMultiplayerResult(msg) {
  const me = msg.results.find(r => r.id === myId);
  document.getElementById("result-title").textContent = me && me.dist != null
    ? `📏 ${Math.round(me.dist)} km away`
    : "No guess submitted";
  document.getElementById("result-detail").textContent = me ? `+${me.points} points this round` : "";
  document.getElementById("result-comment").textContent = me && me.dist != null ? distanceComment(me.dist) : "";
  document.getElementById("signup-btn").style.display = "none"; // only offered at the actual game-over screen

  const table = document.getElementById("results-table");
  table.style.display = "table";
  const sorted = [...msg.results].sort((a, b) => b.total - a.total);
  table.innerHTML = sorted.map(r =>
    `<tr><td>${r.name}</td><td>${r.dist != null ? Math.round(r.dist) + ' km' : '—'}</td><td>+${r.points}</td><td><b>${r.total}</b></td></tr>`
  ).join("");

  enterResultMapView();
  if (msg.actual && map) {
    resetMapMarkers();
    actualMarker = L.marker([msg.actual.lat, msg.actual.lon], {
      icon: L.divIcon({ className: '', html: '<div style="width:12px;height:12px;background:#ef4444;border-radius:50%;border:2px solid white"></div>' })
    }).addTo(map);
    map.setView([msg.actual.lat, msg.actual.lon], 4);
  }

  const btn = document.getElementById("next-btn");
  if (myId === hostId) {
    btn.style.display = "inline-block";
    btn.textContent = msg.round >= msg.maxRounds ? "See final results" : "Next round";
    btn.onclick = () => {
      ws.send(JSON.stringify({ type: "start_round" }));
      document.getElementById("result").style.display = "none";
      exitResultMapView();
    };
  } else {
    btn.style.display = "none";
  }
  document.getElementById("result").style.display = "flex";
}

function showMultiplayerGameOver(msg) {
  document.getElementById("result").style.display = "flex";
  enterResultMapView();
  document.getElementById("result-title").textContent = "Game over";
  document.getElementById("result-detail").textContent = "";
  document.getElementById("result-comment").textContent = "";
  const table = document.getElementById("results-table");
  table.style.display = "table";
  const sorted = [...msg.players].sort((a, b) => b.score - a.score);
  table.innerHTML = sorted.map((p, i) => `<tr><td>#${i + 1}</td><td>${p.name}</td><td><b>${p.score}</b></td></tr>`).join("");
  const btn = document.getElementById("next-btn");
  btn.style.display = "none";
  document.getElementById("signup-btn").style.display = "inline-block";
}

function submitGuessMultiplayer() {
  if (!guessMarker) { showToast("Click the map to place a guess first"); return; }
  if (hasGuessedThisRound) return;
  hasGuessedThisRound = true;
  document.getElementById("guess-btn").disabled = true;
  const guess = guessMarker.getLatLng();
  ws.send(JSON.stringify({ type: "submit_guess", lat: guess.lat, lon: guess.lng }));
  document.getElementById("loading").style.display = "flex";
  document.getElementById("loading").textContent = "Guess submitted — waiting for other players...";
}

function initMap() {
  // Without maxBounds, Leaflet lets you keep panning past +/-180deg into a
  // repeated copy of the world map — a click there returns a raw longitude
  // outside -180..180 (e.g. 200 instead of -160), which throws off both the
  // guess marker's position and the line drawn to the actual location.
  // Locking to a single world copy (plus wrap() as a defensive fallback)
  // keeps every click a normal, real-world coordinate.
  map = L.map('map', {
    maxBounds: [[-90, -180], [90, 180]],
    maxBoundsViscosity: 1.0,
  }).setView([20, 0], 2);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 18, noWrap: true }).addTo(map);
  map.on('click', (e) => {
    // Once results are showing, the guess is already scored — clicking the
    // (still-zoomable) result map shouldn't be able to move the pin anymore.
    if (!roundActive) return;
    if (guessMarker) map.removeLayer(guessMarker);
    guessMarker = L.marker(e.latlng.wrap()).addTo(map);
  });
  const wrap = document.getElementById('map-wrap');
  wrap.addEventListener('mouseenter', () => setTimeout(() => map.invalidateSize(), 210));
  wrap.addEventListener('mouseleave', () => setTimeout(() => map.invalidateSize(), 210));
  // Touch devices don't get :hover, so tap-to-expand toggles a class instead.
  // Registered on the CAPTURE phase (and stopped there) so the very first tap
  // only expands the map — without this, that same click already reaches
  // Leaflet's own click handler on the way down/up and places a guess at
  // whatever imprecise spot the tiny collapsed map happened to be showing,
  // before the user ever gets to see the expanded view.
  const supportsHover = window.matchMedia('(hover: hover)').matches;
  wrap.addEventListener('click', (e) => {
    if (!supportsHover && !wrap.classList.contains('expanded')) {
      e.stopPropagation();
      wrap.classList.add('expanded');
      setTimeout(() => map.invalidateSize(), 210);
    }
  }, true);
  document.addEventListener('click', (e) => {
    if (wrap.classList.contains('expanded') && !wrap.contains(e.target)) {
      wrap.classList.remove('expanded');
      setTimeout(() => map.invalidateSize(), 210);
    }
  });
}

function submitGuess(forced) {
  if (!guessMarker) {
    if (!forced) { showToast("Click the map to place a guess first"); return; }
    stopTimer();
    document.getElementById("results-table").style.display = "none";
    document.getElementById("next-btn").style.display = "inline-block";
    document.getElementById("result-title").textContent = "Time's up!";
    document.getElementById("result-detail").textContent = `+0 points · Total: ${totalScore}`;
    document.getElementById("result-comment").textContent = "";
    document.getElementById("signup-btn").style.display = "none";
    document.getElementById("result").style.display = "flex";
    enterResultMapView();
    return;
  }
  stopTimer();
  const guess = guessMarker.getLatLng();
  const dist = haversine(guess.lat, guess.lng, currentCoords.lat, currentCoords.lon);
  const points = scoreFromDistance(dist);
  totalScore += points;
  document.getElementById("score").textContent = totalScore;
  saveSoloSession();

  document.getElementById("result").style.display = "flex";
  enterResultMapView();
  actualMarker = L.marker([currentCoords.lat, currentCoords.lon], {
    icon: L.divIcon({ className: '', html: '<div style="width:12px;height:12px;background:#ef4444;border-radius:50%;border:2px solid white"></div>' })
  }).addTo(map);
  connectLine = L.polyline([guess, [currentCoords.lat, currentCoords.lon]], { color: '#ef4444', dashArray: '4' }).addTo(map);
  map.fitBounds(connectLine.getBounds(), { padding: [40, 40] });

  document.getElementById("results-table").style.display = "none";
  document.getElementById("next-btn").style.display = "inline-block";
  document.getElementById("signup-btn").style.display = "none";
  document.getElementById("result-title").textContent = `📏 ${Math.round(dist)} km away`;
  document.getElementById("result-detail").textContent = `+${points} points · Total: ${totalScore}`;
  document.getElementById("result-comment").textContent = distanceComment(dist);
}

function nextRound() {
  document.getElementById("result").style.display = "none";
  exitResultMapView();
  if (guessMarker) { map.removeLayer(guessMarker); guessMarker = null; }
  if (actualMarker) { map.removeLayer(actualMarker); actualMarker = null; }
  if (connectLine) { map.removeLayer(connectLine); connectLine = null; }
  map.setView([20, 0], 2);

  round++;
  if (round > MAX_ROUNDS) {
    clearSoloSession();
    document.getElementById("result-title").textContent = "Game over";
    document.getElementById("result-detail").textContent = `Final score: ${totalScore} / ${MAX_ROUNDS * 5000}`;
    document.getElementById("signup-btn").style.display = practiceMode ? "none" : "inline-block";
    document.getElementById("result").style.display = "flex";
    const btn = document.getElementById("next-btn");
    btn.textContent = "Play again";
    btn.onclick = () => {
      round = 1; totalScore = 0;
      document.getElementById("score").textContent = 0;
      document.getElementById("result").style.display = "none";
      btn.textContent = "Next round";
      btn.onclick = nextRound;
      loadRound();
    };
    return;
  }
  loadRound();
}

function startGame(practice) {
  if (!TOKEN.startsWith("MLY|")) {
    showToast("Set your token in the TOKEN constant near the top of the script first.", { error: true, duration: 5000 });
    return;
  }
  clearSoloSession();
  isMultiplayer = false;
  practiceMode = !!practice;
  round = 1; totalScore = 0;
  document.getElementById("score").textContent = 0;
  document.getElementById("start-screen").style.display = "none";
  document.getElementById("game").style.display = "block";
  document.getElementById("player-list").style.display = "none";
  // If the previous game session ended on a result screen, roundActive and
  // the photo panel's interactivity were left blocked (enterResultMapView
  // sets them, and only nextRound()/the host "Continue" button undo it) —
  // reset them here too so a freshly-started game isn't born stuck.
  roundActive = true;
  document.getElementById("photo-panel").style.pointerEvents = "";
  if (!map) initMap();
  loadRound();
}

function resumeSoloSession(solo) {
  isMultiplayer = false;
  practiceMode = !!solo.practiceMode;
  round = solo.round || 1;
  totalScore = solo.totalScore || 0;
  roundActive = true;
  document.getElementById("photo-panel").style.pointerEvents = "";
  document.getElementById("start-screen").style.display = "none";
  document.getElementById("game").style.display = "block";
  document.getElementById("player-list").style.display = "none";
  document.getElementById("score").textContent = totalScore;
  document.getElementById("round").textContent = round;
  document.getElementById("guess-btn").disabled = false;
  if (!map) initMap();

  const status = document.getElementById("loading");
  status.style.display = "flex";
  status.textContent = "Loading street view...";
  currentCoords = (solo.lat != null && solo.lon != null) ? { lat: solo.lat, lon: solo.lon } : null;
  mountViewer(solo.imageId, { onImage: () => { status.style.display = "none"; saveSoloSession(); } });
  if (!practiceMode) startTimer(SOLO_TIMEOUT_MS);
}

function showLobby() {
  document.getElementById("lobby").style.display = "flex";
  document.getElementById("start-btn").style.display = "none";
  document.getElementById("friends-btn").style.display = "none";
  document.getElementById("start-divider").style.display = "none";
  document.getElementById("practice-btn").style.display = "none";
  document.getElementById("start-account-row").style.display = "none";
}

// Ask for a name once, then remember it in localStorage — no more retyping
// it every time you play with friends.
let afterNamePrompt = showLobby;
function getSavedName() {
  return localStorage.getItem(PLAYER_NAME_KEY) || "";
}
function showNamePrompt(onDone) {
  afterNamePrompt = onDone || showLobby;
  document.getElementById("start-btn").style.display = "none";
  document.getElementById("friends-btn").style.display = "none";
  document.getElementById("start-divider").style.display = "none";
  document.getElementById("practice-btn").style.display = "none";
  document.getElementById("start-account-row").style.display = "none";
  document.getElementById("name-prompt").style.display = "flex";
  document.getElementById("player-name-input").focus();
}
function playWithFriends(onReady) {
  const saved = getSavedName();
  if (saved) {
    myName = saved;
    (onReady || showLobby)();
  } else {
    showNamePrompt(onReady);
  }
}

function leaveGame() {
  if (!confirm("Leave the game?")) return;
  stopTimer();
  if (isMultiplayer && ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: "leave_room" }));
    ws.close();
  }
  clearMPSession();
  clearSoloSession();
  resetToStartScreen();
}

function resetToStartScreen() {
  isMultiplayer = false;
  myId = null; hostId = null; currentRoomCode = null; myToken = null;
  latestPlayers = [];
  hasGuessedThisRound = false;
  round = 1; totalScore = 0;
  roundActive = true;
  document.getElementById("photo-panel").style.pointerEvents = "";
  document.getElementById("score").textContent = 0;
  document.getElementById("round").textContent = 1;
  currentImageId = null; currentCoords = null;

  // Fully tear down the map/viewer instead of just hiding them — Leaflet
  // refuses to re-initialize a container that still has a live map bound to it.
  if (mlyViewer) { try { mlyViewer.remove(); } catch {} mlyViewer = null; }
  if (map) { try { map.remove(); } catch {} map = null; }
  guessMarker = null; actualMarker = null; connectLine = null;
  document.getElementById('map-wrap').classList.remove('result-view', 'expanded');

  document.getElementById("game").style.display = "none";
  document.getElementById("player-list").style.display = "none";
  document.getElementById("result").style.display = "none";

  document.getElementById("lobby").style.display = "none";
  document.getElementById("name-prompt").style.display = "none";
  document.getElementById("lobby-create").style.display = "block";
  document.getElementById("lobby-join").style.display = "block";
  document.getElementById("lobby-join").previousElementSibling.style.display = "block";
  document.getElementById("lobby-waiting").style.display = "none";
  document.getElementById("start-btn").style.display = "inline-block";
  document.getElementById("friends-btn").style.display = "inline-block";
  document.getElementById("start-divider").style.display = "block";
  document.getElementById("practice-btn").style.display = "inline-block";
  document.getElementById("start-account-row").style.display = "flex";

  document.getElementById("start-screen").style.display = "flex";
}

function createRoom() {
  isMultiplayer = true;
  connectWS(() => ws.send(JSON.stringify({ type: "create_room", name: myName })));
}

function joinRoom(codeOverride) {
  const code = codeOverride || document.getElementById("join-code-input").value.trim().toUpperCase();
  if (!code) { showToast("Enter a room code"); return; }
  isMultiplayer = true;
  connectWS(() => ws.send(JSON.stringify({ type: "join_room", name: myName, code })));
}

function attemptRejoin(session) {
  myName = session.name || "Player";
  isMultiplayer = true;
  document.getElementById("start-screen").style.display = "none";
  document.getElementById("game").style.display = "block";
  document.getElementById("player-list").style.display = "block";
  document.getElementById("loading").style.display = "flex";
  document.getElementById("loading").textContent = "Reconnecting...";
  if (!map) initMap();
  connectWS(() => ws.send(JSON.stringify({ type: "rejoin", code: session.code, token: session.token })));
}

document.getElementById("start-btn").addEventListener("click", () => startGame(false));
document.getElementById("practice-btn").addEventListener("click", () => startGame(true));
document.getElementById("friends-btn").addEventListener("click", () => playWithFriends());
document.getElementById("save-name-btn").addEventListener("click", () => {
  const input = document.getElementById("player-name-input");
  const name = input.value.trim();
  if (!name) { showToast("Enter your name first"); input.focus(); return; }
  localStorage.setItem(PLAYER_NAME_KEY, name);
  myName = name;
  document.getElementById("name-prompt").style.display = "none";
  afterNamePrompt();
});
document.getElementById("player-name-input").addEventListener("keydown", (e) => {
  if (e.key === "Enter") document.getElementById("save-name-btn").click();
});
document.getElementById("create-room-btn").addEventListener("click", createRoom);
document.getElementById("join-room-btn").addEventListener("click", () => joinRoom());
document.getElementById("host-start-btn").addEventListener("click", () => {
  ws.send(JSON.stringify({ type: "start_round" }));
  document.getElementById("host-start-btn").style.display = "none";
  document.getElementById("lobby-status").textContent = "Starting...";
});
document.getElementById("copy-link-btn").addEventListener("click", () => {
  const link = document.getElementById("lobby-link").textContent;
  if (!link) return;
  navigator.clipboard.writeText(link).then(() => {
    const btn = document.getElementById("copy-link-btn");
    const old = btn.textContent;
    btn.textContent = "Copied!";
    setTimeout(() => { btn.textContent = old; }, 1500);
  }).catch(() => {});
});
document.getElementById("guess-btn").addEventListener("click", () => {
  if (isMultiplayer) submitGuessMultiplayer(); else submitGuess();
});
document.getElementById("leave-btn").addEventListener("click", leaveGame);
document.getElementById("lobby-leave-btn").addEventListener("click", leaveGame);
document.getElementById("result-leave-btn").addEventListener("click", leaveGame);
document.getElementById("menu-btn").addEventListener("click", (e) => {
  e.stopPropagation();
  document.getElementById("menu-dropdown").classList.toggle("open");
});
document.addEventListener("click", (e) => {
  const wrap = document.getElementById("menu-wrap");
  if (!wrap.contains(e.target)) document.getElementById("menu-dropdown").classList.remove("open");
});
function onAccountButtonClick() {
  if (authToken) logOut();
  else openAuthModal();
}
document.getElementById("account-btn").addEventListener("click", onAccountButtonClick);
document.getElementById("menu-account-btn").addEventListener("click", onAccountButtonClick);
document.getElementById("leaderboard-btn").addEventListener("click", openLeaderboard);
document.getElementById("menu-leaderboard-btn").addEventListener("click", openLeaderboard);
document.getElementById("leaderboard-close-btn").addEventListener("click", closeLeaderboard);
document.getElementById("auth-close-btn").addEventListener("click", closeAuthModal);
document.getElementById("auth-submit-btn").addEventListener("click", submitAuthForm);
document.getElementById("auth-switch-btn").addEventListener("click", () => {
  authMode = authMode === "signup" ? "login" : "signup";
  applyAuthMode();
});
document.getElementById("auth-password").addEventListener("keydown", (e) => {
  if (e.key === "Enter") submitAuthForm();
});
document.getElementById("signup-btn").addEventListener("click", handleSaveScoreClick);
document.getElementById("next-btn").addEventListener("click", () => {
  if (!isMultiplayer) nextRound();
  // multiplayer next-btn's onclick is set dynamically in showMultiplayerResult
});

initMusic();
updateAuthUI();
restoreAuthSession();

// On load: a shared room link takes priority, then a saved multiplayer
// session (rejoin in place), then a saved solo session (resume same photo).
(function initSession() {
  const params = new URLSearchParams(location.search);
  const roomCode = params.get("room");
  if (roomCode) {
    playWithFriends(() => {
      showLobby();
      document.getElementById("join-code-input").value = roomCode.toUpperCase();
    });
    return;
  }
  const mp = loadMPSession();
  if (mp && mp.code && mp.token) {
    attemptRejoin(mp);
    return;
  }
  const solo = loadSoloSession();
  if (solo && solo.imageId) {
    resumeSoloSession(solo);
  }
})();
</script>
